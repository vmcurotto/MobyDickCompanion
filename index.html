<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moby Dick — Reading Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a1628;--bg2:#0f1e36;--card:#122038;--card-h:#1a2a50;
      --border:#1e3355;--border2:#2a4070;
      --gold:#c9a84c;--gold2:#e8c876;--blue:#2d7dd2;--teal:#1a9e8f;
      --text:#e8dcc8;--dim:#a89880;--muted:#6a7a8a;
      --red:#c94040;--green:#2d8c5a;--purple:#7c4dba;
    }
    body{background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;min-height:100vh;line-height:1.65}
    h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif;line-height:1.25}
    a{color:var(--gold);text-decoration:none}
    a:hover{color:var(--gold2);text-decoration:underline}
    button{cursor:pointer;font-family:inherit}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

    /* NAV */
    .nav{background:linear-gradient(180deg,#060e1c 0%,var(--bg2) 100%);border-bottom:1px solid var(--border);padding:0;position:sticky;top:0;z-index:100}
    .nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:0;padding:0 1rem}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);padding:1rem 1.5rem 1rem 0;border-right:1px solid var(--border);white-space:nowrap;font-style:italic}
    .nav-brand span{font-size:.7rem;display:block;color:var(--dim);font-style:normal;letter-spacing:.1em;text-transform:uppercase}
    .nav-links{display:flex;flex:1;overflow-x:auto;gap:0}
    .nav-btn{background:none;border:none;color:var(--dim);padding:.9rem 1rem;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Lora',serif}
    .nav-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
    .nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

    /* LAYOUT */
    .main{max-width:1400px;margin:0 auto;padding:2rem 1.5rem}
    .section-header{margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
    .section-header h2{font-size:2rem;color:var(--gold);margin-bottom:.4rem}
    .section-header p{color:var(--dim);font-size:.95rem;font-style:italic}

    /* CARDS */
    .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;transition:all .2s}
    .card:hover{border-color:var(--border2);background:var(--card-h)}
    .card-grid{display:grid;gap:1rem}
    .card-grid-2{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
    .card-grid-3{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}

    /* TAGS */
    .tag{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;font-family:system-ui,sans-serif;font-weight:600}
    .tag-narrative{background:#1a3d5c;color:#7abde8}
    .tag-philosophical{background:#2d1a5c;color:#b07ae8}
    .tag-essayistic{background:#1a4a2d;color:#7ae8a0}
    .tag-action{background:#4a2d1a;color:#e8a07a}
    .tag-lyrical{background:#2d3d1a;color:#b8e87a}
    .tag-dramatic{background:#4a1a2d;color:#e87ab0}
    .tag-phil-badge{background:linear-gradient(135deg,#7c4dba,#c9a84c);color:#fff;font-size:.65rem;padding:.15rem .5rem}
    .tag-theme{background:var(--bg2);color:var(--gold);border:1px solid var(--border2)}

    /* CHAPTER */
    .ch-card{background:var(--card);border:1px solid var(--border);border-radius:6px;transition:all .2s;overflow:hidden}
    .ch-card.read{border-color:#1a4a2d;background:#0d1e12}
    .ch-card.phil{border-left:3px solid var(--gold)}
    .ch-header{display:flex;align-items:flex-start;gap:.75rem;padding:1rem 1.25rem;cursor:pointer}
    .ch-header:hover{background:rgba(255,255,255,.03)}
    .ch-num{font-size:.75rem;color:var(--muted);min-width:2.2rem;padding-top:.15rem;font-family:system-ui}
    .ch-title{flex:1;font-family:'Playfair Display',serif;font-size:.95rem;color:var(--text)}
    .ch-title.read{color:var(--muted)}
    .ch-badges{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:.3rem}
    .ch-check{width:20px;height:20px;border:2px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem;transition:all .2s;background:none}
    .ch-check.checked{background:var(--green);border-color:var(--green)}
    .ch-check svg{fill:white;width:10px;height:10px}
    .ch-body{padding:0 1.25rem 1rem;border-top:1px solid var(--border)}
    .ch-summary{color:var(--dim);font-size:.88rem;line-height:1.7;margin-top:.85rem;font-style:italic}
    .ch-notes{margin-top:.85rem}
    .ch-notes label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:.4rem}
    .ch-notes textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.6rem .8rem;font-family:'Lora',serif;font-size:.85rem;resize:vertical;min-height:70px;transition:border .2s}
    .ch-notes textarea:focus{outline:none;border-color:var(--gold)}
    .ch-themes{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}

    /* DASHBOARD */
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;text-align:center}
    .stat-num{font-size:2.5rem;font-family:'Playfair Display',serif;color:var(--gold);line-height:1}
    .stat-label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:.4rem}
    .progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:.75rem}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:4px;transition:width .5s}

    /* CHARS */
    .char-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;transition:all .2s}
    .char-card:hover{border-color:var(--gold);transform:translateY(-2px)}
    .char-name{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);margin-bottom:.2rem}
    .char-role{font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem;font-family:system-ui}
    .char-section{margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border)}
    .char-section h4{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:.4rem;font-family:system-ui}
    .char-section p{font-size:.88rem;color:var(--dim);line-height:1.65}

    /* HIERARCHY */
    .hierarchy{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-top:2rem}
    .hierarchy h3{font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:1.25rem;text-align:center;font-style:italic}
    .hier-level{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin:1rem 0;position:relative}
    .hier-node{background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:.5rem 1rem;font-size:.82rem;color:var(--text);text-align:center;min-width:100px}
    .hier-node.captain{border-color:var(--gold);color:var(--gold);font-weight:600}
    .hier-node.mate{border-color:var(--blue);color:#7abde8}
    .hier-node.harpoon{border-color:var(--teal);color:#7ae8d8}
    .hier-connector{text-align:center;color:var(--muted);font-size:.75rem;letter-spacing:.1em;margin:.25rem 0}

    /* THEMES */
    .theme-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;cursor:pointer;transition:all .2s}
    .theme-card:hover{border-color:var(--gold);transform:translateY(-2px)}
    .theme-name{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--gold);margin-bottom:.5rem}
    .theme-desc{font-size:.88rem;color:var(--dim);line-height:1.65;margin-bottom:.75rem}
    .theme-ch-count{font-size:.8rem;color:var(--muted);font-family:system-ui}
    .theme-detail{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-top:1.5rem}
    .theme-detail h3{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.5rem;margin-bottom:.5rem}
    .theme-detail .desc{color:var(--dim);font-style:italic;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
    .theme-ch-list{display:flex;flex-direction:column;gap:.75rem}
    .theme-ch-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.9rem 1.1rem;cursor:pointer;transition:all .2s}
    .theme-ch-item:hover{border-color:var(--gold)}
    .theme-ch-item strong{font-family:'Playfair Display',serif;color:var(--text);font-size:.95rem;display:block;margin-bottom:.3rem}
    .theme-ch-item p{font-size:.84rem;color:var(--dim)}

    /* PRIMERS */
    .primer-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.5rem;cursor:pointer;transition:all .2s}
    .primer-card:hover{border-color:var(--gold);transform:translateY(-2px)}
    .primer-title{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--gold);margin-bottom:.5rem}
    .primer-preview{font-size:.88rem;color:var(--dim);line-height:1.65}
    .primer-full{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:2rem;margin-top:1.5rem;max-width:800px;margin-left:auto;margin-right:auto}
    .primer-full h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.75rem;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
    .primer-full p{color:var(--dim);font-size:.92rem;line-height:1.85;margin-bottom:1rem}
    .primer-full h3{font-family:'Playfair Display',serif;color:var(--text);font-size:1.1rem;margin:1.25rem 0 .5rem}

    /* RESOURCES */
    .resource-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1.25rem 1.5rem;transition:all .2s}
    .resource-card:hover{border-color:var(--blue)}
    .resource-tag{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);font-family:system-ui;font-weight:600;margin-bottom:.4rem}
    .resource-title{font-family:'Playfair Display',serif;color:var(--text);font-size:1.05rem;margin-bottom:.4rem}
    .resource-desc{font-size:.85rem;color:var(--dim);line-height:1.6}

    /* UTIL */
    .back-btn{background:none;border:1px solid var(--border);color:var(--dim);padding:.5rem 1rem;border-radius:4px;font-size:.82rem;margin-bottom:1.5rem;display:inline-flex;align-items:center;gap:.4rem;transition:all .2s}
    .back-btn:hover{border-color:var(--gold);color:var(--gold)}
    .search-bar{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.7rem 1rem;font-family:'Lora',serif;font-size:.9rem;margin-bottom:1.25rem;transition:border .2s}
    .search-bar:focus{outline:none;border-color:var(--gold)}
    .filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .filter-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:.35rem .85rem;border-radius:20px;font-size:.78rem;transition:all .2s;font-family:system-ui}
    .filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold)}
    .divider{border:none;border-top:1px solid var(--border);margin:2rem 0}
    .cotd-card{background:linear-gradient(135deg,#0f2040,#1a1040);border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin-bottom:2rem}
    .cotd-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin-bottom:.5rem;font-family:system-ui}
    .cotd-num{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--text);margin-bottom:.3rem}
    .cotd-summary{font-size:.88rem;color:var(--dim);font-style:italic;line-height:1.7}
    .notes-section h3{font-family:'Playfair Display',serif;color:var(--text);font-size:1.1rem;margin-bottom:1rem}
    .note-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.9rem 1.1rem;margin-bottom:.75rem;cursor:pointer;transition:all .2s}
    .note-item:hover{border-color:var(--gold)}
    .note-item strong{font-size:.82rem;color:var(--gold);display:block;margin-bottom:.3rem}
    .note-item p{font-size:.84rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .empty{text-align:center;color:var(--muted);font-style:italic;padding:3rem;font-size:.9rem}
    .quote-block{border-left:3px solid var(--gold);padding:.75rem 1.25rem;margin:1rem 0;font-style:italic;color:var(--dim);font-size:.9rem}

    /* WHALE ORNAMENT */
    .ornament{text-align:center;color:var(--border2);font-size:1.5rem;margin:1.5rem 0;letter-spacing:.5rem}

    /* CHAPTER DETAIL PANEL */
    @keyframes detailFade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .ch-body{animation:detailFade .22s ease}
    .ch-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:1.1rem}
    .ch-detail-section{margin-top:1.1rem}
    .ch-detail-section:first-child{margin-top:.85rem}
    .ch-section-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-family:system-ui,sans-serif;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
    .ch-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .ch-analysis{color:var(--dim);font-size:.88rem;line-height:1.8}
    .ch-passage-block{background:linear-gradient(135deg,#0c1a30,#0f1428);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:.85rem 1.1rem;margin-top:.5rem}
    .ch-passage-text{color:var(--text);font-size:.88rem;line-height:1.75;font-style:italic}
    .ch-passage-source{font-size:.72rem;color:var(--muted);margin-top:.4rem;font-style:normal;font-family:system-ui}
    .ch-connections{display:flex;flex-direction:column;gap:.45rem;margin-top:.5rem}
    .ch-conn-item{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:.55rem .85rem;cursor:pointer;transition:all .18s;display:flex;gap:.65rem;align-items:flex-start}
    .ch-conn-item:hover{border-color:var(--gold);background:var(--card-h)}
    .ch-conn-num{font-size:.7rem;font-family:system-ui;color:var(--gold);font-weight:700;white-space:nowrap;padding-top:.1rem;min-width:4rem}
    .ch-conn-note{font-size:.8rem;color:var(--dim);line-height:1.55}
    .ch-notes-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.35rem}
    .ch-char-count{font-size:.7rem;color:var(--muted);font-family:system-ui}
    .ch-saved{font-size:.7rem;color:var(--teal);font-family:system-ui;opacity:0;transition:opacity .3s}
    .ch-saved.visible{opacity:1}
    .ch-summary-plain{color:var(--dim);font-size:.88rem;line-height:1.75;margin-top:.85rem;font-style:italic;padding:.75rem 1rem;background:var(--bg2);border-radius:5px;border-left:2px solid var(--border2)}

    @media(max-width:768px){
      .ch-detail-grid{grid-template-columns:1fr}
      .nav-brand span{display:none}
      .nav-btn{padding:.7rem .7rem;font-size:.75rem}
      .main{padding:1.25rem 1rem}
      .section-header h2{font-size:1.5rem}
      .card-grid-2,.card-grid-3{grid-template-columns:1fr}
      .dash-grid{grid-template-columns:1fr 1fr}
      .primer-full{padding:1.25rem}
    }
  </style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Playfair Display',serif;color:#c9a84c;font-size:1.2rem;font-style:italic">Loading the Pequod…</div></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback} = React;

// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════

const PHIL_CHAPTERS = new Set([1,9,23,24,32,35,36,41,42,47,60,68,72,79,89,90,93,94,96,99]);

const TONE_COLORS = {narrative:'tag-narrative',philosophical:'tag-philosophical',essayistic:'tag-essayistic',action:'tag-action',lyrical:'tag-lyrical',dramatic:'tag-dramatic'};

const THEME_MAP = {
  fate:{label:'Fate vs Free Will',color:'#b07ae8'},
  obsession:{label:'Obsession',color:'#e87a7a'},
  knowledge:{label:'Limits of Knowledge',color:'#7abde8'},
  evil:{label:'The Problem of Evil',color:'#e8a07a'},
  transcend:{label:'Transcendentalism',color:'#7ae8a0'},
  power:{label:'Power & Authority',color:'#e8c876'},
  community:{label:'Individual vs Community',color:'#7ae8d8'},
  race:{label:'Race & Hierarchy',color:'#e8b07a'},
  religion:{label:'Religion vs Modernity',color:'#d07ae8'},
};

const CHAPTERS = [
  {id:1,title:"Loomings",tone:"philosophical",summary:"Ishmael introduces himself and explains his compulsion to go to sea whenever life becomes oppressive. A meditation on water's primal draw on the human soul — and on why we're attracted to what might destroy us.",themes:["fate","transcend","knowledge"]},
  {id:2,title:"The Carpet-Bag",tone:"narrative",summary:"Ishmael packs his carpetbag and sets off for New Bedford on a cold December night, wandering dark streets in search of cheap lodging.",themes:["community"]},
  {id:3,title:"The Spouter-Inn",tone:"narrative",summary:"Ishmael finds the Spouter-Inn run by Peter Coffin and is forced to share a bed with Queequeg, a heavily tattooed harpooner from the South Seas.",themes:["community","race"]},
  {id:4,title:"The Counterpane",tone:"lyrical",summary:"Ishmael wakes to find Queequeg's arm thrown over him. He recalls a childhood memory and meditates on the strange intimacy of their shared situation.",themes:["community","race"]},
  {id:5,title:"Breakfast",tone:"narrative",summary:"A brief comic scene at the inn's breakfast table, where Queequeg eats alone and uses his harpoon to spear the meat while other boarders look on.",themes:["race"]},
  {id:6,title:"The Street",tone:"essayistic",summary:"Ishmael strolls New Bedford, observing its cosmopolitan mix of sailors from every nation — a city made rich by the sea and its dangers.",themes:["race","community"]},
  {id:7,title:"The Chapel",tone:"lyrical",summary:"Ishmael visits the Whaleman's Chapel, where marble tablets commemorating lost sailors line the walls. A sober meditation on death and the sea's toll.",themes:["religion","fate"]},
  {id:8,title:"The Pulpit",tone:"lyrical",summary:"Description of the ship-shaped pulpit in the chapel, from which Father Mapple will preach — accessible only by a rope ladder he pulls up after ascending.",themes:["religion","power"]},
  {id:9,title:"The Sermon",tone:"philosophical",summary:"Father Mapple delivers a powerful sermon on Jonah and the whale, preaching about sin, duty, and God's inescapable justice. A theological keynote for the novel.",themes:["religion","fate","evil","obsession"]},
  {id:10,title:"A Bosom Friend",tone:"narrative",summary:"Ishmael and Queequeg become genuine friends. Ishmael reflects on how easy it is to bond with someone across vast cultural differences when approached openly.",themes:["community","race"]},
  {id:11,title:"Nightgown",tone:"lyrical",summary:"Ishmael and Queequeg sit up late in bed, smoking and talking. One of the novel's warmest and most intimate chapters.",themes:["community"]},
  {id:12,title:"Biographical",tone:"narrative",summary:"Queequeg tells his story: he is a prince from the island of Kokovoko who left his homeland to experience Christian civilization — and now cannot return.",themes:["race","community","religion"]},
  {id:13,title:"Wheelbarrow",tone:"narrative",summary:"Ishmael and Queequeg travel toward Nantucket. Queequeg tells a comic story about misusing a wheelbarrow in his early encounters with Western culture.",themes:["race","community"]},
  {id:14,title:"Nantucket",tone:"lyrical",summary:"A brief, lyrical celebration of Nantucket — a tiny sandbar that sent its ships across every ocean and came to dominate the world's supply of whale oil.",themes:["community","power"]},
  {id:15,title:"Chowder",tone:"narrative",summary:"Ishmael and Queequeg arrive in Nantucket and eat magnificent clam and cod chowder at the Try Pots inn. A comic, sensuous interlude.",themes:["community"]},
  {id:16,title:"The Ship",tone:"narrative",summary:"Ishmael and Queequeg choose the Pequod as their ship, dealing with the eccentric Quaker co-owners Peleg and Bildad. Ahab is discussed but not seen.",themes:["power","fate","religion"]},
  {id:17,title:"The Ramadan",tone:"narrative",summary:"Queequeg spends a day in religious fasting and meditation that alarms Ishmael. A comic yet respectful chapter on religious difference and private devotion.",themes:["religion","community","race"]},
  {id:18,title:"His Mark",tone:"narrative",summary:"Queequeg signs on to the Pequod. The owners are impressed by his harpooning skill; he signs the contract by tattooing a symbol as his mark.",themes:["race","power"]},
  {id:19,title:"The Prophet",tone:"dramatic",summary:"A strange man named Elijah cryptically warns Ishmael and Queequeg about Ahab, hinting at dark fates, mysterious extra crew, and doomed outcomes.",themes:["fate","religion","evil"]},
  {id:20,title:"All Astir",tone:"narrative",summary:"The ship is loaded and made ready for voyage. Bildad and Peleg bustle about with exaggerated Quaker frugality, and the air buzzes with pre-departure energy.",themes:["community","power"]},
  {id:21,title:"Going Aboard",tone:"narrative",summary:"Ishmael and Queequeg go aboard in pre-dawn darkness. They glimpse shadowy figures boarding before them — the first hint of Ahab's hidden Parsee crew.",themes:["fate","evil"]},
  {id:22,title:"Merry Christmas",tone:"narrative",summary:"The Pequod sets sail on Christmas Day, with Peleg and Bildad comically commanding the departure before transferring command and leaving the ship.",themes:["community","religion"]},
  {id:23,title:"The Lee Shore",tone:"lyrical",summary:"A brief, intense meditation on Bulkington, a sailor who prefers the dangerous open sea to the false safety of land. Often read as the novel's philosophical creed.",themes:["fate","transcend","knowledge","community"]},
  {id:24,title:"The Advocate",tone:"essayistic",summary:"Ishmael defends the dignity and importance of the whaling industry in a mock-serious essay, cataloguing its civilizational contributions. A rhetorical tour de force.",themes:["power","knowledge","community"]},
  {id:25,title:"Postscript",tone:"essayistic",summary:"A humorous addendum noting that sperm oil is used to anoint kings at coronations — linking the ignoble whale to the sacred seats of power.",themes:["power","religion"]},
  {id:26,title:"Knights and Squires",tone:"narrative",summary:"Introduction of the three mates: Starbuck (first mate, moral, Nantucket Quaker), Stubb (second mate, cheerfully fatalistic), and Flask (third mate, dull but competent).",themes:["power","community","fate"]},
  {id:27,title:"Knights and Squires (II)",tone:"narrative",summary:"Introduction of the three harpooners: Queequeg, Tashtego (Gay Head Indian), and Daggoo (African). Also introduces the crew's extraordinary multicultural diversity.",themes:["race","community","power"]},
  {id:28,title:"Ahab",tone:"dramatic",summary:"Captain Ahab appears on deck for the first time. His ivory leg, deeply scarred face, and somber presence create an atmosphere of dread and fascination.",themes:["obsession","power","evil","fate"]},
  {id:29,title:"Enter Ahab; to Him, Stubb",tone:"dramatic",summary:"Ahab confronts Stubb for suggesting he remove an annoying noise. A tense exchange establishing Ahab's absolute, unquestioned authority over the crew.",themes:["power","obsession"]},
  {id:30,title:"The Pipe",tone:"lyrical",summary:"Ahab throws his pipe into the sea, realizing he can no longer enjoy simple pleasures. A symbolic act marking his total absorption in his obsession.",themes:["obsession","fate","evil"]},
  {id:31,title:"Queen Mab",tone:"narrative",summary:"Stubb tells Flask about a dream in which Ahab kicked him with his ivory leg. A comic chapter with darker undertones about the nature of submission to power.",themes:["power","fate","obsession"]},
  {id:32,title:"Cetology",tone:"essayistic",summary:"An extensive, encyclopedic classification of all whale species by Ishmael — part genuine natural history, part parody of scientific classification systems.",themes:["knowledge","transcend"]},
  {id:33,title:"The Specksynder",tone:"essayistic",summary:"A historical digression on the chief harpooner's role in early whaling voyages, expanding into a meditation on the sources and nature of authority.",themes:["power","knowledge"]},
  {id:34,title:"The Cabin-Table",tone:"narrative",summary:"A description of the strict hierarchy at Ahab's dinner table, where the mates eat in rigid order of rank under his oppressive, wordless authority.",themes:["power","community"]},
  {id:35,title:"The Mast-Head",tone:"philosophical",summary:"Ishmael meditates on standing watch at the mast-head, and the danger of becoming so absorbed in pantheistic reverie that one forgets to watch for whales — a warning against transcendentalism.",themes:["transcend","knowledge","fate"]},
  {id:36,title:"The Quarter-Deck",tone:"dramatic",summary:"The novel's turning point: Ahab reveals his true mission to the crew, nailing a gold doubloon to the mast as reward for first sighting Moby Dick. The crew is swept into his obsession; only Starbuck resists.",themes:["obsession","power","fate","evil","community"]},
  {id:37,title:"Sunset",tone:"dramatic",summary:"Ahab alone at sunset, soliloquizing about his fate with tragic self-awareness. He knows his quest is madness but cannot stop. One of the novel's great dramatic monologues.",themes:["obsession","fate","evil","transcend"]},
  {id:38,title:"Dusk",tone:"dramatic",summary:"Starbuck's soliloquy at dusk, expressing his fear of Ahab and his own moral paralysis. He sees the danger but cannot bring himself to act.",themes:["fate","power","evil","community"]},
  {id:39,title:"First Night-Watch",tone:"dramatic",summary:"Stubb's brief soliloquy: cheerful and fatalistic, he accepts whatever comes. A counterpoint to Ahab's grandiosity and Starbuck's anguish.",themes:["fate","community"]},
  {id:40,title:"Midnight, Forecastle",tone:"dramatic",summary:"The sailors of all nations sing, dance, and brawl on deck in a theatrical, polyglot cacophony beneath a threatening sky — humanity's roar against the dark.",themes:["race","community","fate"]},
  {id:41,title:"Moby Dick",tone:"philosophical",summary:"The central chapter: the history and mythology of Moby Dick, how this particular whale became feared across the whaling world, and the true, psychological nature of Ahab's obsession.",themes:["obsession","evil","knowledge","fate","transcend"]},
  {id:42,title:"The Whiteness of the Whale",tone:"philosophical",summary:"A profound philosophical meditation on the terror of whiteness — its blankness, its ambiguity, its suggestion of the void at the heart of existence. One of American literature's great philosophical passages.",themes:["knowledge","evil","transcend","religion","fate"]},
  {id:43,title:"Hark!",tone:"narrative",summary:"Below decks, sailors hear mysterious sounds — likely the hidden Parsee crew that boarded in darkness. The ship harbors secrets.",themes:["fate","evil"]},
  {id:44,title:"The Chart",tone:"narrative",summary:"Ahab alone in his cabin, obsessively charting known paths of sperm whale migrations to calculate where Moby Dick will be — a scene of manic, visionary intensity.",themes:["obsession","knowledge","fate"]},
  {id:45,title:"The Affidavit",tone:"essayistic",summary:"Ishmael establishes the factual basis for the novel by citing real cases of whale attacks and individual whales recognized across many voyages.",themes:["knowledge"]},
  {id:46,title:"Surmises",tone:"narrative",summary:"Ahab calculates how to maintain the crew's commitment to his mission while managing their practical concerns about profit and safety.",themes:["power","obsession","community"]},
  {id:47,title:"The Mat-Maker",tone:"philosophical",summary:"Ishmael and Queequeg weave a sword mat. A celebrated meditation on fate, free will, and chance as the three forces shaping human life. Interrupted by the first whale sighting.",themes:["fate","community","transcend"]},
  {id:48,title:"The First Lowering",tone:"action",summary:"The crew lowers boats to chase whales for the first time. A vivid, chaotic scene: Ishmael's boat is nearly swamped and lost in fog.",themes:["fate","community","obsession"]},
  {id:49,title:"The Hyena",tone:"narrative",summary:"After the near-disaster, Ishmael asks Queequeg to help him write a will. A darkly comic chapter about learning to accept death as a constant companion at sea.",themes:["fate","community"]},
  {id:50,title:"Ahab's Boat and Crew; Fedallah",tone:"narrative",summary:"The mysterious crew members are revealed: Fedallah, a Parsee prophet, leads a secret group who will man Ahab's personal whaleboat.",themes:["fate","evil","religion","power"]},
  {id:51,title:"The Spirit-Spout",tone:"lyrical",summary:"A mysterious silver jet of water appears in the moonlight ahead of the ship night after night, appearing to lead the Pequod onward toward some terrible destination.",themes:["fate","evil","obsession"]},
  {id:52,title:"The Albatross",tone:"lyrical",summary:"The Pequod encounters the battered Goney, a homebound ship. Communication fails between the vessels and they pass in silence — a moment of profound missed connection.",themes:["fate","community","knowledge"]},
  {id:53,title:"The Gam",tone:"essayistic",summary:"An essay on the 'gam' — the practice of two whale ships meeting at sea to exchange news, crew visits, and human company over vast oceanic distances.",themes:["community","knowledge"]},
  {id:54,title:"The Town-Ho's Story",tone:"narrative",summary:"Ishmael (speaking later, in Lima) recounts the Town-Ho, where a near-mutiny by a sailor named Steelkilt culminated in Moby Dick's appearance and a kind of rough justice.",themes:["power","fate","evil","community","race"]},
  {id:55,title:"Of the Monstrous Pictures of Whales",tone:"essayistic",summary:"Ishmael surveys paintings and illustrations of whales across history and art, finding them all comically, fascinatingly wrong.",themes:["knowledge"]},
  {id:56,title:"Of the Less Erroneous Pictures",tone:"essayistic",summary:"A continuation of the survey, identifying the slightly less inaccurate whale images and considering what all representations reveal about human projection.",themes:["knowledge"]},
  {id:57,title:"Of Whales in Paint, Teeth, Wood…",tone:"essayistic",summary:"A further catalogue of whale representations in art, artifact, and nature — from scrimshaw to mountain formations to constellations.",themes:["knowledge","transcend"]},
  {id:58,title:"Brit",tone:"lyrical",summary:"The Pequod sails through vast fields of brit — the tiny yellow crustaceans that whales feed on. A meditation on the sea's beauty concealing bottomless menace.",themes:["knowledge","evil","transcend"]},
  {id:59,title:"Squid",tone:"narrative",summary:"The crew spots a gigantic white squid floating on the surface — regarded by old sailors as a terrible omen of what lies ahead.",themes:["fate","evil","knowledge"]},
  {id:60,title:"The Line",tone:"philosophical",summary:"An essay on the whale line — the rope attached to the harpoon. Its manufacture, use, and the mortal danger it poses to every man in the boat. Extended as metaphor for fate.",themes:["fate","community","knowledge"]},
  {id:61,title:"Stubb Kills a Whale",tone:"action",summary:"A vivid, detailed description of a whale hunt led by Stubb, ending with the whale's death at moonrise. Stubb sings and smokes throughout.",themes:["fate","power"]},
  {id:62,title:"The Dart",tone:"essayistic",summary:"A technical essay on harpoon-throwing that questions the wisdom of requiring harpooners to row exhaustingly before throwing — the madness built into the system.",themes:["knowledge","power","community"]},
  {id:63,title:"The Crotch",tone:"essayistic",summary:"An explanation of the wooden crotch for resting harpoons, expanding into a meditation on the dangers of split attention and the costs of the second iron.",themes:["knowledge","fate"]},
  {id:64,title:"Stubb's Supper",tone:"narrative",summary:"Stubb eats a midnight supper of whale steak beside the carcass while old Fleece the cook is made to preach a sermon to the circling sharks. A darkly comic masterpiece.",themes:["race","power","religion","evil"]},
  {id:65,title:"The Whale as a Dish",tone:"essayistic",summary:"An essay on the history of humans eating whale meat, ranging from ancient cultures to contemporary practice.",themes:["knowledge","race"]},
  {id:66,title:"The Shark Massacre",tone:"action",summary:"The crew kills sharks swarming the dead whale carcass overnight. Queequeg is nearly bitten while chaining the body.",themes:["fate","evil","race"]},
  {id:67,title:"Cutting In",tone:"narrative",summary:"The technical process of stripping blubber from the whale carcass, described in precise procedural detail — a strange industrial choreography.",themes:["knowledge","community"]},
  {id:68,title:"The Blanket",tone:"philosophical",summary:"A meditation on the whale's thick blubber as an insulating 'blanket' — and on the broader question of outer appearances versus inner truth.",themes:["knowledge","transcend","evil"]},
  {id:69,title:"The Funeral",tone:"lyrical",summary:"The stripped whale carcass is set adrift, followed by circling sharks and sea birds. A meditation on death, waste, and the sea's absolute indifference.",themes:["fate","evil","transcend"]},
  {id:70,title:"The Sphynx",tone:"dramatic",summary:"Ahab addresses the severed sperm whale's head hanging from the ship's side, demanding it reveal the ocean's secrets. A brooding, Gothic scene of futile interrogation.",themes:["knowledge","obsession","evil","fate"]},
  {id:71,title:"The Jeroboam's Story",tone:"narrative",summary:"The Pequod encounters the Jeroboam, whose crew is dominated by Gabriel, a mad prophet who claims the white whale is the Shaker God and has prohibited its pursuit.",themes:["religion","power","fate","evil"]},
  {id:72,title:"The Monkey-Rope",tone:"philosophical",summary:"Ishmael describes the monkey-rope connecting him to Queequeg as they work the carcass — a meditation on human interdependence, shared fate, and the impossibility of solitary existence.",themes:["community","fate","race"]},
  {id:73,title:"Stubb and Flask Kill a Right Whale",tone:"narrative",summary:"The two mates kill a right whale. The Pequod now carries both a sperm and a right whale's head — which Ishmael compares to Locke and Kant, philosophy's opposing poles.",themes:["knowledge","fate"]},
  {id:74,title:"The Sperm Whale's Head — Contrasted View",tone:"essayistic",summary:"A detailed, thoughtful description of the sperm whale's massive, flat-browed head — its anatomy, its spermaceti case, and its strange, inscrutable dignity.",themes:["knowledge","transcend"]},
  {id:75,title:"The Right Whale's Head — Contrasted View",tone:"essayistic",summary:"A companion chapter describing the right whale's very different head — its enormous lower jaw, its baleen, its vaguely Stoic expression.",themes:["knowledge"]},
  {id:76,title:"The Battering-Ram",tone:"essayistic",summary:"A meditation on the sperm whale's forehead as an instrument of destruction — dense, solid, and terrifyingly powerful, designed by nature to ram ships.",themes:["knowledge","evil","power"]},
  {id:77,title:"The Great Heidelburgh Tun",tone:"essayistic",summary:"Description of the spermaceti case atop the whale's head, compared to a great wine barrel — a reservoir of the purest oil requiring hazardous extraction.",themes:["knowledge","community"]},
  {id:78,title:"Cistern and Buckets",tone:"action",summary:"Tashtego falls into the whale's open head while extracting spermaceti. Queequeg dives in to rescue him, pulling him out feet-first — like a baby being born.",themes:["fate","community","race"]},
  {id:79,title:"The Prairie",tone:"philosophical",summary:"A meditation on reading character from the whale's inscrutable forehead — the physiognomist's art applied to God's most mysterious creature.",themes:["knowledge","transcend","evil"]},
  {id:80,title:"The Nut",tone:"essayistic",summary:"A meditation on the sperm whale's tiny brain relative to its enormous skull, and what this implies about intelligence, will, and the power of pure instinct.",themes:["knowledge","evil","transcend"]},
  {id:81,title:"The Pequod Meets the Virgin",tone:"action",summary:"The Pequod encounters a German ship (the Jungfrau) that has run out of oil. Both ships race to catch the same whale; the Pequod wins in a vivid competitive chase.",themes:["power","fate","community"]},
  {id:82,title:"The Honor and Glory of Whaling",tone:"essayistic",summary:"Ishmael catalogues famous whalers from history and mythology — Perseus, Hercules, St. George, Jonah, Vishnu — claiming all were, in a sense, whalemen.",themes:["knowledge","religion","power"]},
  {id:83,title:"Jonah Historically Considered",tone:"essayistic",summary:"A satirical, mock-scholarly examination of whether the Jonah story is physically possible — interviewing an imaginary commentator who defends every implausible detail.",themes:["religion","knowledge"]},
  {id:84,title:"Pitchpoling",tone:"action",summary:"Flask pitchpoles a whale — throwing a long lance like a javelin to administer the killing blow. A vivid technical description of an unusual hunting method.",themes:["fate","power"]},
  {id:85,title:"The Fountain",tone:"essayistic",summary:"An extended essay on the whale's spout — what it physically is, what various naturalists have claimed, and what Ishmael thinks it represents spiritually.",themes:["knowledge","transcend","religion"]},
  {id:86,title:"The Tail",tone:"lyrical",summary:"A lyrical meditation on the sperm whale's magnificent tail — its beauty, its explosive power, its expressive range, and its ultimate inscrutability.",themes:["knowledge","transcend"]},
  {id:87,title:"The Grand Armada",tone:"action",summary:"The Pequod chases a vast herd of sperm whales in the Java Sea. In the miraculous calm at the center of the circling herd, Ishmael's boat finds nursing mothers and calves — a vision of peace amid chaos.",themes:["transcend","community","fate","evil"]},
  {id:88,title:"Schools and Schoolmasters",tone:"essayistic",summary:"An essay on whale social groups: bachelor bulls, harems guarded by old males, and nursing schools — Ishmael's anthropomorphizing reads like a gentle satire of human society.",themes:["power","community","race"]},
  {id:89,title:"Fast-Fish and Loose-Fish",tone:"philosophical",summary:"A philosophical essay on whaling property law — a 'fast fish' belongs to whoever has it; a 'loose fish' is free to all. Extended into a devastating critique of all forms of possession, colonialism, and exploitation.",themes:["power","race","community","knowledge","fate"]},
  {id:90,title:"Heads or Tails",tone:"essayistic",summary:"English law requires that the head and tail of any caught whale be presented to the Crown. Ishmael uses this to satirize arbitrary authority and the absurdity of legal power.",themes:["power","knowledge","race"]},
  {id:91,title:"The Pequod Meets the Rose-Bud",tone:"narrative",summary:"The Pequod encounters a French ship struggling with a diseased, foul-smelling whale. Stubb tricks the French captain into abandoning it and secretly extracts the valuable ambergris.",themes:["power","community","race"]},
  {id:92,title:"Ambergris",tone:"essayistic",summary:"An essay on ambergris — the precious, sweet-smelling waxy substance formed in whale intestines. Used in the world's finest perfumes, it comes from a diseased bowel.",themes:["knowledge","evil"]},
  {id:93,title:"The Castaway",tone:"dramatic",summary:"Pip, the young Black cabin boy, falls overboard during a whale chase and is left behind in the open ocean. When recovered, his mind has broken. He has seen 'God's foot upon the treadle of the loom.'",themes:["fate","evil","race","transcend","knowledge"]},
  {id:94,title:"A Squeeze of the Hand",tone:"philosophical",summary:"Sailors squeeze congealed sperm oil back into liquid with their bare hands, accidentally grasping each other's fingers in the warmth. A moment of involuntary communion and one of the novel's most utopian passages.",themes:["community","transcend","race"]},
  {id:95,title:"The Cassock",tone:"essayistic",summary:"A bawdy, satirical chapter about the whale's enormous foreskin being fashioned into a garment for the mincer — a job compared, with deadpan irony, to that of a bishop.",themes:["religion","power","knowledge"]},
  {id:96,title:"The Try-Works",tone:"philosophical",summary:"The ship at night, lit by the hellish fires of the try-works rendering blubber into oil. Ishmael falls asleep at the helm, nearly capsizing the ship. A vision of madness, damnation, and the cost of obsession.",themes:["evil","obsession","fate","transcend","knowledge"]},
  {id:97,title:"The Lamp",tone:"lyrical",summary:"A brief meditation on the whale-oil lamp: whalers work in darkness to bring light to the world — a quiet irony unnoticed by those who benefit from it.",themes:["knowledge","community","power"]},
  {id:98,title:"Stowing Down and Clearing Up",tone:"narrative",summary:"The process of storing rendered oil below decks and cleaning the ship after the trying-out. The ship transformed from hellish chaos back to gleaming order — temporarily.",themes:["community","knowledge"]},
  {id:99,title:"The Doubloon",tone:"philosophical",summary:"Each crew member gazes at the gold doubloon nailed to the mast and reads its symbolic engravings according to his own character. A meditation on the impossibility of objective meaning and the projective nature of all interpretation.",themes:["knowledge","fate","obsession","transcend","evil"]},
  {id:100,title:"Leg and Arm: The Samuel Enderby",tone:"narrative",summary:"The Pequod meets an English whaling ship whose captain also lost a limb to Moby Dick — but chose acceptance rather than obsession. A crucial foil to Ahab's tragic stance.",themes:["obsession","fate","community","evil"]},
  {id:101,title:"The Decanter",tone:"essayistic",summary:"An essay on the history of the Samuel Enderby whale-oil firm in London, plus a warm appreciation of good drink and good company — one of the lighter digressions.",themes:["community","knowledge"]},
  {id:102,title:"A Bower in the Arsacides",tone:"essayistic",summary:"Ishmael recalls visiting the skeleton of a beached sperm whale on a South Sea island, now overgrown with vegetation and sacred to the native people.",themes:["knowledge","religion","transcend"]},
  {id:103,title:"Measuring the Whale's Skeleton",tone:"essayistic",summary:"Ishmael attempts to record the whale's dimensions from memory while the harpooner Tashtego looks on skeptically. A meditation on the gap between living reality and recorded measurement.",themes:["knowledge"]},
  {id:104,title:"The Fossil Whale",tone:"essayistic",summary:"A meditation on fossil whales and geological time. The whale's species has survived for millions of years and outlasted civilizations; its antiquity humbles all human history.",themes:["knowledge","transcend","fate"]},
  {id:105,title:"Does the Whale's Magnitude Diminish?",tone:"essayistic",summary:"Ishmael argues that the whale, being a creature of the vast ocean, cannot be exterminated by humans the way land animals have been. (Melville was wrong, but movingly so.)",themes:["knowledge","power","fate"]},
  {id:106,title:"Ahab's Leg",tone:"narrative",summary:"Ahab's ivory leg was damaged stepping between ships; the carpenter must make a new one. Starbuck discovers this and worries about Ahab's fitness for command.",themes:["obsession","power","fate"]},
  {id:107,title:"The Carpenter",tone:"narrative",summary:"Introduction to the Pequod's remarkable carpenter — a man of extraordinary practical skill who approaches all tasks with calm equanimity, without asking why.",themes:["community","power","fate"]},
  {id:108,title:"Ahab and the Carpenter",tone:"dramatic",summary:"Ahab orders the carpenter to make him a new leg. A darkly comic dialogue between Ahab's metaphysical grandiosity and the carpenter's cheerful, literal-minded pragmatism.",themes:["obsession","knowledge","power","fate"]},
  {id:109,title:"Ahab and Starbuck in the Cabin",tone:"dramatic",summary:"The novel's most tense confrontation: Starbuck discovers water casks are leaking and urges turning back. Ahab refuses with terrifying force. Their struggle over the ship's soul reaches its crisis.",themes:["power","obsession","fate","evil","community"]},
  {id:110,title:"Queequeg in His Coffin",tone:"narrative",summary:"Queequeg falls gravely ill and orders a coffin built to precise specifications. Inexplicably, he recovers — and the coffin becomes his sea chest. A pivot point in the novel's symbolic architecture.",themes:["fate","community","race","religion"]},
  {id:111,title:"The Pacific",tone:"lyrical",summary:"A brief lyrical meditation on the Pacific as the spiritual center of the world — ancient, vast, barely touched by Western civilization, and unknowable.",themes:["transcend","knowledge","fate"]},
  {id:112,title:"The Blacksmith",tone:"narrative",summary:"Introduction of Perth, the ship's blacksmith, who came to sea after losing his family through drink and debt. Another crew member destroyed by grief and bad fortune.",themes:["fate","community","evil"]},
  {id:113,title:"The Forge",tone:"dramatic",summary:"Ahab orders Perth to forge a special harpoon to kill Moby Dick — tempered in the blood of the three pagan harpooners in a ritual that inverts baptism.",themes:["obsession","evil","religion","fate","race"]},
  {id:114,title:"The Gilder",tone:"lyrical",summary:"On a golden afternoon, Ahab, Starbuck, and Stubb each meditate on the sea's sudden, uncanny peace and beauty. Ahab alone refuses to be seduced away from his purpose.",themes:["obsession","transcend","fate","community"]},
  {id:115,title:"The Pequod Meets the Bachelor",tone:"narrative",summary:"The Pequod encounters a Nantucket ship homeward bound after a wildly successful voyage, its crew celebrating. Ahab refuses to join and turns grimly away.",themes:["obsession","community","fate"]},
  {id:116,title:"The Dying Whale",tone:"lyrical",summary:"Ahab watches a dying whale slowly turn its head to face the sun at the moment of death. He meditates on this final gesture with dark, private meaning.",themes:["fate","transcend","evil","obsession"]},
  {id:117,title:"The Whale Watch",tone:"dramatic",summary:"Fedallah keeps watch over a dead whale through the night. In a whispered exchange with Ahab, he delivers his cryptic prophecy about the conditions under which Ahab will die.",themes:["fate","evil","religion","obsession"]},
  {id:118,title:"The Quadrant",tone:"dramatic",summary:"Ahab uses the quadrant to determine latitude, then in a rage at its limitations, destroys it. He will navigate by pure dead reckoning — a rejection of all external guidance.",themes:["obsession","knowledge","fate","power"]},
  {id:119,title:"The Candles",tone:"dramatic",summary:"A terrific storm sends St. Elmo's fire blazing from the mast-heads. In a spectacular speech, Ahab defies the fire as an omen and claims it as confirmation of his own dark divinity.",themes:["obsession","evil","fate","religion","power"]},
  {id:120,title:"The Deck Towards the End of the First Night Watch",tone:"dramatic",summary:"A brief interlude: Ahab commands the helmsman to steer by the stars rather than the now-treacherous compass.",themes:["fate","power","obsession"]},
  {id:121,title:"Midnight — The Forecastle Bulwarks",tone:"dramatic",summary:"Stubb and Flask exchange brief, anxious words in the dark. The ship feels fated and the end is near.",themes:["fate","community"]},
  {id:122,title:"Midnight Aloft — Thunder and Lightning",tone:"dramatic",summary:"A one-paragraph chapter: Tashtego drives a nail through a flag to prevent it being torn away. Three words long in some editions — the novel's compression before explosion.",themes:["fate"]},
  {id:123,title:"The Musket",tone:"dramatic",summary:"Starbuck stands alone on deck holding a loaded musket intended for bears. He goes below to Ahab's cabin, stands over the sleeping captain — and turns away. The moment passes, and the fate is sealed.",themes:["fate","power","evil","community"]},
  {id:124,title:"The Needle",tone:"dramatic",summary:"The storm has reversed the ship's compass. Ahab fashions a new one from a needle, lance, and sailmaker's needle — again asserting his will over nature's disruptions.",themes:["obsession","fate","knowledge","power"]},
  {id:125,title:"The Log and Line",tone:"narrative",summary:"The log and line used to measure the ship's speed are rotted from disuse; a sailor is nearly pulled overboard recovering them. The ship has decayed with obsession.",themes:["obsession","fate","knowledge"]},
  {id:126,title:"The Life-Buoy",tone:"narrative",summary:"A sailor cries out in the night and a life-buoy is lost. It cannot be replaced — until the carpenter converts Queequeg's coffin into a new one. The circle closes.",themes:["fate","community","religion"]},
  {id:127,title:"The Deck",tone:"dramatic",summary:"Ahab and the carpenter discuss the coffin-turned-life-buoy. The carpenter's matter-of-fact pragmatism contrasts unbearably with the weight of the symbol.",themes:["fate","knowledge","obsession"]},
  {id:128,title:"The Pequod Meets the Rachel",tone:"dramatic",summary:"The Rachel has lost a whale boat containing the captain's own young son; the captain begs Ahab to help search. Ahab refuses. The novel's moral low point.",themes:["obsession","community","evil","fate","race"]},
  {id:129,title:"The Cabin",tone:"narrative",summary:"Ahab increasingly withdraws into his cabin. His behavior has become erratic and remote. He is in the final stages of his consuming obsession.",themes:["obsession","fate","evil"]},
  {id:130,title:"The Hat",tone:"lyrical",summary:"A sea-hawk steals Ahab's hat and drops it in the ocean. An omen. Fedallah keeps silent watch, his eyes never leaving the captain.",themes:["fate","evil","obsession"]},
  {id:131,title:"The Pequod Meets the Delight",tone:"dramatic",summary:"The Pequod encounters a ship whose crew has just buried men killed by Moby Dick. Ahab asks if the whale can be killed; the captain holds up a shattered harpoon for an answer.",themes:["fate","evil","obsession","community"]},
  {id:132,title:"The Symphony",tone:"dramatic",summary:"On a serene day of extraordinary beauty, Ahab speaks with sudden, unexpected tenderness to Starbuck — and nearly relents. He weeps, remembering his wife and child. The moment passes. He re-commits.",themes:["obsession","community","fate","evil","transcend"]},
  {id:133,title:"The Chase — First Day",tone:"action",summary:"Moby Dick is sighted. The chase begins in earnest. Fedallah's boat is destroyed; the whale smashes Ahab's boat into splinters. The crew swims among wreckage.",themes:["fate","obsession","evil","community"]},
  {id:134,title:"The Chase — Second Day",tone:"action",summary:"The second day's pursuit. Fedallah is found lashed to the whale by tangled harpoon lines — dead, wound around the whale's body. His prophecy begins to fulfill itself.",themes:["fate","evil","obsession","religion"]},
  {id:135,title:"The Chase — Third Day",tone:"action",summary:"The final day. Moby Dick turns and rams the Pequod, which sinks. Ahab hurls his last harpoon and is caught in the line, dragged instantly to the bottom. Every soul is lost. Ishmael alone survives on Queequeg's coffin.",themes:["fate","evil","obsession","community","transcend","religion"]},

const CH_DETAILS = {
  1:{
    analysis:"'Loomings' is one of the most deliberately crafted opening chapters in American literature. Ishmael's first line — 'Call me Ishmael' — refuses biography: the name signals the biblical outcast, the one who survives outside the covenant. Melville immediately establishes the novel's central metaphysical project: the sea is not a setting but a symbol for the unconscious, for death, for the totality of existence that land-life refuses to face. The catalogue of people drawn to water — islanders at the harbour, sailors at the docks, the drowning Narcissus — builds to the chapter's devastating thesis: Narcissus died reaching for the image of himself in the fountain, and the sea is therefore 'the image of the ungraspable phantom of life.' Ishmael goes to sea not to escape mortality but to confront it honestly, on the sea's own terms. The tone is ironic, philosophical, and already self-undermining — a narrator who suspects his stated reasons for going are rationalizations for something deeper and darker.",
    passage:{text:"And still deeper the meaning of that story of Narcissus, who because he could not grasp the tormenting, mild image he saw in the fountain, plunged into it and was drowned. But that same image, we ourselves see in all rivers and oceans. It is the image of the ungraspable phantom of life; and this is the key to it all.",source:"Chapter 1 — the novel's philosophical thesis in miniature"},
    connections:[{id:23,note:"The Lee Shore gives the same compulsion its most serious philosophical justification."},{id:35,note:"The Mast-Head shows the danger when this oceanic absorption is taken too far."},{id:41,note:"Moby Dick is the 'ungraspable phantom' of this chapter made literal and monstrous."}]
  },
  2:{
    analysis:"Superficially a travel chapter, 'The Carpet-Bag' performs careful atmospheric work as controlled disorientation. Melville has Ishmael arrive in New Bedford on a bleak December night, lost in a labyrinth of dark streets — an enactment of psychological as much as geographic displacement. The comedy of his missteps (he walks into a Black church, thinking it is an inn; he stumbles through freezing dark) is gentle but purposeful: this is a man stripped of social bearings, learning to navigate by instinct. The city of New Bedford — wealthy from whale oil, ringed by sailors' memorial chapels — is already a world defined by profit extracted from mortal danger. Melville also begins the novel's engagement with race here without fanfare, noting Ishmael's accidental entry into 'a negro church' with no moral commentary — simply recording it, allowing the reader to notice.",
    passage:{text:"It was a very dark and dismal night, bitingly cold and cheerless. I knew no one in the place. With anxious grapnels I had sounded my pocket, and only brought up a few pieces of silver,— so, with both hands folded before me, and my eyes intently watching for my signal, I sat down on a curbstone.",source:"Chapter 2 — Ishmael alone in the dark"},
    connections:[{id:6,note:"The Street expands this night-time New Bedford sketch into a fuller sociological portrait."},{id:7,note:"The chapels hinted at in the dark here are explored in full."},{id:14,note:"Nantucket's bleaker, cleaner geography contrasts with New Bedford's rich labyrinth."}]
  },
  3:{
    analysis:"The Spouter-Inn chapter is a masterwork of atmospheric Gothic and social comedy. It opens with an oil painting above the bar — a chaotic, barely decipherable image that Ishmael spends considerable time interpreting, finally deciding it depicts a whale crashing into a ship. This painting is the novel in miniature: something overwhelming that demands interpretation, resists it, and yields different answers to every viewer — a technique Melville will repeat with the doubloon in Chapter 99. The inn itself, run by the aptly named Peter Coffin, is decorated with harpoons for hat-racks and coffin-coloured furniture: the domestic turned morbid. The forced bedsharing with Queequeg is played for comedy but without caricature; by morning, Ishmael has decided that a man who pays his half of the bill is civilized regardless of his tattoos — a moral position arrived at by logic rather than sentiment.",
    passage:{text:"Such was the impenetrable veil that shrouded the painting and hid it from the puzzled beholder. But at length I began to bethink me what that great painting really looked like. It was a very large oil-painting so thoroughly besmoked, and every way defaced, that in the unequal crosslights by which you viewed it, it was only by diligent study and a series of systematic visits to it, and careful inquiry of the neighbors, that you could any way arrive at an understanding of its purpose.",source:"Chapter 3 — the painting as a figure for the novel's own interpretive challenge"},
    connections:[{id:4,note:"The Counterpane continues directly from this night into the morning after."},{id:10,note:"The friendship begun uncomfortably here is sealed as a genuine bond."},{id:99,note:"The oil painting's interpretive instability directly anticipates the doubloon chapter."}]
  },
  4:{
    analysis:"Brief and psychologically rich, 'The Counterpane' weaves present experience and childhood memory in a way that reveals Melville's quiet sophistication. Ishmael wakes to find Queequeg's arm thrown over him — intimate, fatherly — and is transported to a childhood memory of being put to bed as punishment and waking with a supernatural hand holding his in the dark. The connection is subtle: the warmth of an alien body triggers a memory of uncanny comfort, suggesting that human connection across strangeness participates in something larger than itself. The chapter also introduces the novel's patchwork motif: the quilt of many pieces becomes a figure for the multicultural crew, and Queequeg's tattooed body — itself a kind of quilt of symbols — is already being read as a text that demands interpretation.",
    passage:{text:"He seemed to be dozing. Sprawling out a little and hardly knowing it, I myself was fast melting away its indeterminate condition. At last I must have fallen into a troubled nightmare of a doze; and slowly waking from it — half steeped in dreams — I opened my eyes, and the before sun-lit room was now wrapped in outer darkness.",source:"Chapter 4 — the morning-after meditation"},
    connections:[{id:3,note:"Follows directly from the night at the Spouter-Inn."},{id:11,note:"Nightgown gives the warmth of this chapter its own small chapter."},{id:72,note:"The Monkey-Rope literalises the physical entanglement hinted at by this embrace."}]

  5:{
    analysis:"'Breakfast' is one of the novel's briefest chapters and functions as comic character sketch. The Spouter-Inn boarders eat in hulking, tattooed silence, consuming enormous quantities of food without conversation — a farcical tableau of masculine anti-sociality. Queequeg's use of his harpoon to spear food across the table is gently comic rather than savage; Melville's quiet point is that the supposedly civilized boarders are no more conversational than the 'cannibal.' The chapter earns its place by establishing the social world the novel will inhabit: these are men shaped by the sea into something that no longer fits comfortably at a domestic table. Ishmael's own sociability — he actually wants to talk to people — marks him as unusual, the observer among the observed.",
    passage:{text:"The landlord was near springing upon him, but Queequeg instantly laid his hand upon the hilt of his tomahawk, and quelling the rising tumult of the harpooneer's excited interest in a very cool and collected manner, one and all, with the utmost good humor, were seized by the ears and fairly dragged to the table, and coolly sat down to their eggs and coffee.",source:"Chapter 5 — a tableau of maritime manhood at breakfast"},
    connections:[{id:6,note:"The Street continues the social survey of New Bedford begun here."},{id:34,note:"The Cabin-Table darkens this scene — meals become instruments of enforced hierarchy."},{id:64,note:"Stubb's Supper is the novel's darkest version of eating amid carnage."}]

  6:{
    analysis:"'The Street' is a sociological essay dressed as a morning stroll, and an early signal that Melville intends something more ambitious than adventure fiction. Ishmael's walk through New Bedford's docks reveals a cosmopolitan carnival of Pacific peoples — Feegeeans, Tongatabooans, Erromanggoans — a half-invented catalogue that mixes comedy with genuine respect. New Bedford is wealthy because it sends these men across the world to hunt and die; the city's genteel prosperity is built on global violence and global diversity simultaneously. Melville celebrates the mixture while quietly noting the exploitation underneath. The chapter also establishes Ishmael's characteristic narrative stance: the intelligent outsider, amused and observant, refusing to moralize but consistently noticing what others prefer not to see.",
    passage:{text:"In thoroughfares nigh the docks, any considerable seaport will frequently offer to view the queerest looking nondescripts from foreign parts. Even in Broadway and Chestnut streets, Mediterranean mariners will sometimes jostle the affrighted ladies. Regent Street is not unknown to Lascars and Malays; and at Bombay, in the Apollo Green, live Yankees have often scared the natives.",source:"Chapter 6 — New Bedford as microcosm of the world"},
    connections:[{id:27,note:"The multicultural New Bedford streets find their concentrated form in the Pequod's crew."},{id:40,note:"Midnight, Forecastle is the cacophony of these global voices at full volume."},{id:89,note:"Fast-Fish and Loose-Fish names explicitly what this chapter only implies about exploitation."}]
  },
  7:{
    analysis:"The Whaleman's Chapel is the novel's first explicitly sacred space, treated with a gravity that precludes easy irony. The marble tablets lining the walls — commemorating men lost at sea, bodies never recovered — confront Ishmael with mortality in its starkest, most unanswerable form: the simple gap in a family history, a name and a date and nothing after. Ishmael's meditation here is his most explicitly philosophical before the later great chapters: he decides that in order to do anything worthwhile, one must already be 'socially dead' — must have honestly made peace with one's death before embarking. This is not nihilism but something closer to Stoic preparation: you cannot act bravely until you have faced what you're risking. The chapter's quiet, sustained gravity prepares the ground for Mapple's rhetoric and makes that thunder feel earned.",
    passage:{text:"I looked round me tranquilly and contentedly, like a quiet ghost with a clean conscience sitting inside the bars of a snug family vault. Now then, thought I, unconsciously rolling up the sleeves of my frock, here goes for a cool, collected dive at death and destruction, and the devil fetch the hindmost.",source:"Chapter 7 — Ishmael's pre-voyage reckoning with mortality"},
    connections:[{id:8,note:"The Chapel leads directly into the Pulpit, as Ishmael's meditation prepares for Mapple's sermon."},{id:9,note:"The silent grief of the memorial tablets is answered by Mapple's articulate theology."},{id:110,note:"Queequeg in His Coffin: the acceptance of death modelled here is literalised when Queequeg builds his own coffin."}]
  },
  8:{
    analysis:"Melville gives the pulpit its own chapter as an act of architectural hermeneutics — the physical structure encodes the theological meaning before a word is spoken. The ship-shaped pulpit, reachable only by a rope ladder that Mapple pulls up after ascending, makes of preaching an act of maritime isolation: the preacher casts off from the congregation, ascending alone to deliver truth. This is simultaneously a celebration of prophetic solitude and a quiet critique of it — he has literally removed himself from the community he addresses. The prow-shaped design aligns Word and world, sermon and sea, making Mapple's coming interpretation of Jonah not merely moral instruction but navigational guidance. Every descriptive detail carries symbolic weight; this is Melville showing his method.",
    passage:{text:"What could be more full of meaning? — for the pulpit is ever this earth's foremost part; all the rest comes in its rear; the pulpit leads the world. From thence it is the storm of God's quick wrath is first descried, and the bow must bear the earliest brunt.",source:"Chapter 8 — the pulpit as the world's prow"},
    connections:[{id:9,note:"The architectural preparation makes Mapple's actual words feel properly weight-bearing."},{id:33,note:"The Specksynder revisits the question of isolated authority in a secular context."},{id:36,note:"Ahab's command of the quarter-deck is another kind of pulpit performance."}]
  },
  9:{
    analysis:"Father Mapple's sermon is the theological heartbeat of the entire novel, and Melville writes it with full imaginative investment — this is not parody. Working through the story of Jonah with scholarly and dramatic care, Mapple articulates a Calvinist ethics of radical obedience: God commands, humans flee, God pursues, and the only dignified response is submission. The sermon's remarkable quality is that it is genuinely persuasive on its own terms — this is not a straw theology. Jonah's sin is not simple disobedience but a deeper cowardice: he pays the sailors' wages hoping to buy his way out of consequences he has created for others. The peroration — 'Delight is to him who gives no quarter in the truth, and kills, burns, and destroys all sin though he pluck it out from under the robes of Senators and Judges' — establishes the moral standard against which Starbuck will later be measured and found wanting. Ahab's defiance is Jonah's flight writ cosmic; the novel's ending is God's inescapable reply.",
    passage:{text:"Woe to him whom this world charms from Gospel duty! Woe to him who seeks to pour oil upon the waters when God has brewed them into a gale! Woe to him who seeks to please rather than to appal! Woe to him whose good name is more to him than goodness! Woe to him who, in this world, courts not dishonor!",source:"Chapter 9 — Mapple's peroration, the novel's moral benchmark"},
    connections:[{id:7,note:"The Chapel's silent grief gives the sermon its emotional foundation."},{id:36,note:"Ahab delivers his own 'sermon' to the crew at the quarter-deck — a dark inversion of Mapple's."},{id:123,note:"Starbuck's failure with the musket is exactly the failure Mapple preaches against."}]
  },
  10:{
    analysis:"The friendship chapter is one of the novel's most generous achievements, and one of the most politically remarkable things Melville wrote. He refuses both comedy of cultural misunderstanding and the sentimentality of easy cross-racial bonding; friendship emerges through observation, respect, and philosophical pragmatism. Ishmael's decision to worship with Queequeg is argued from genuine intellectual humility: since he cannot be certain his own religion is true, it is mere arrogance to refuse to participate in Queequeg's. This is genuine religious tolerance in 1851 America, and it is earned rather than declared. The friendship that follows is the novel's counter-model to Ahab's isolation — two people who have chosen each other freely across every difference, with no hierarchy between them, united by something Melville calls a 'cosy, loving pair.'",
    passage:{text:"I was a good Christian; born and bred in the bosom of the infallible Presbyterian Church. How then could I unite with this wild idolator in worshipping his piece of wood? But what is worship? thought I. Do you suppose now, Ishmael, that the magnanimous God of heaven and earth — pagans and all included — can possibly be jealous of an insignificant bit of black wood?",source:"Chapter 10 — Ishmael's logic of tolerance"},
    connections:[{id:3,note:"The discomfort of the Spouter-Inn night resolves into this genuine warmth."},{id:72,note:"The Monkey-Rope gives their friendship a literal physical form — lives joined by rope."},{id:110,note:"The depth of the bond is tested when Queequeg falls gravely ill."}]
  },
  11:{
    analysis:"'Nightgown' is two deliberate pages of simplicity functioning as breathing room — a chapter that insists on the value of warmth and unheroic comfort before the voyage into mortal danger begins. Ishmael and Queequeg in bed, smoking and talking, represent everything the Pequod's voyage will put at risk: ordinary human warmth, chosen companionship, the pleasure of being at ease. Melville gives this only a brief chapter not to inflate its importance but to record it precisely — the way one notes a good day in a journal before the difficult weeks ahead. The 'nightgown' of the title is a figure for the domestic pleasures that will soon be traded for oilskins and wet rope, and the chapter quietly insists on the moral value of small, unheroic comfort.",
    passage:{text:"He seemed to take to me quite as naturally and unbiddenly as I to him; and when our smoke was over, he pressed his forehead against mine, clasped me round the waist, and said that henceforth we were married; meaning, in his country's phrase, that we were bosom friends.",source:"Chapter 11 — the simplest statement of the novel's central human bond"},
    connections:[{id:10,note:"The friendship declared in A Bosom Friend is given its domestic expression here."},{id:12,note:"Queequeg's ease in this chapter makes his biography in the next feel more poignant."},{id:94,note:"A Squeeze of the Hand is the novel's other great moment of involuntary communal warmth."}]
  },
  12:{
    analysis:"Queequeg's biography is one of the most quietly devastating passages in the novel. He is a prince — heir to a throne — who chose to experience Western civilization and found that once exposed to Christianity, he could not return home in good conscience: he has been contaminated by what he saw. Melville is at his most anthropologically serious here: Queequeg does not condemn the West; he simply notes that it has made him unfit for the position he was born to, without offering an equivalent in return. Yet he is not bitter — he is realistic and dignified. His decision to ship as a harpooner is pragmatic and chosen; he will earn his place in the world on his own terms. The chapter makes Queequeg's subsequent actions — his friendship, his religion, his labor — legible as the choices of a genuinely free person.",
    passage:{text:"He told me that his father was a High Chief, a King; his uncle a High Priest; and on the maternal side he boasted aunts who were the wives of unconquerable warriors. There was excellent blood in his veins — royal stuff; though sadly vitiated, I fear, by the cannibal propensity he nourished in his untutored youth.",source:"Chapter 12 — Ishmael's ironic rendering of Queequeg's aristocratic origins"},
    connections:[{id:10,note:"His biography makes his open friendship with Ishmael across difference more remarkable."},{id:17,note:"His religious devotion is richer once we understand this background."},{id:110,note:"The dignity of his life story is honoured by the quiet dignity of his coffin preparation."}]
  },
  13:{
    analysis:"'Wheelbarrow' is a transitional chapter that manages travel efficiently while delivering two structurally identical comic vignettes: Queequeg's story of the wheelbarrow (which he misused as a sedan chair) and his rescue of a bumpkin who mocked him on the ferry. Both stories follow the same arc — cultural misunderstanding met with calm, physical competence — and together they define Queequeg's character precisely: he does not retaliate from offense but acts only out of genuine necessity (the bumpkin would have drowned). The wheelbarrow story does quiet philosophical work: the same object can mean completely different things in different cultural contexts, which anticipates the novel's larger epistemological argument about the impossibility of universal interpretation. No object carries fixed meaning; meaning is always brought to it.",
    passage:{text:"'What you tink now?' — Ishmael speaking — 'Is't not a wise man's thought that a man need not speak wisely, to speak well?' Queequeg then told me that in his land, the custom was for the bridegroom to carry the bride on his shoulders — not unlike what some young bucks among us do now.",source:"Chapter 13 — the wheelbarrow misread across cultures"},
    connections:[{id:10,note:"Shows Queequeg's character in action — protective, competent, unresentful."},{id:6,note:"The comedy of cross-cultural encounter established in The Street continues here."},{id:72,note:"His protective instinct foreshadows his literal life-saving role at the monkey-rope."}]
  },
  14:{
    analysis:"This brief chapter is an exercise in heroic compression — Melville renders Nantucket as near-mythological, a tiny strip of sand that conquered the oceans through sheer human will. The rhetorical strategy begins with the island's apparent insignificance (it can barely grow grass; the winds blow everything off it) and then reveals the historical grandeur produced by exactly this inhospitable condition. The Nantucketers, Melville says, are conquerors of the sea itself — like Alexander annexing territory, they have claimed the ocean as their province. The lyricism is genuine but also gently comic: this is pride being celebrated and lightly mocked at once. The chapter performs the same move Melville will use in Chapter 24: arguing that the most ignoble-seeming thing is actually the most heroic.",
    passage:{text:"What wonder, then, that these Nantucketers, born on a beach, should take to the sea for a livelihood! They first caught crabs and quahogs in the sand; grown bolder, they waded out with nets for mackerel; more experienced, they pushed off in boats and captured cod; and at last, launching a navy of great ships on the sea, explored this watery world.",source:"Chapter 14 — the Nantucketer's heroic trajectory"},
    connections:[{id:24,note:"The Advocate makes the celebration of whaling culture argumentative and serious."},{id:82,note:"The Honor and Glory of Whaling takes the mythologizing of Chapter 14 to its farthest extreme."},{id:2,note:"The contrast with New Bedford's wealthy labyrinth: Nantucket is bleaker, barer, purer."}]
  },
  15:{
    analysis:"'Chowder' earns its reputation as a comic masterpiece through sheer descriptive enthusiasm. The Try Pots inn's clam and cod chowder are rendered with genuine sensory affection — Melville is clearly a man who ate good chowder and thought it worth recording for posterity. But the chapter also performs a tonal function: it establishes that this world contains real, physical pleasure before the voyage strips it away entirely. The name of the inn — Try Pots — refers to the iron kettles used to render whale blubber into oil: even here, at the most domestic of meals, the machinery of the whaling industry lurks underneath the homeliness. The chapter also offers the novel's most authoritative female figure: Mrs. Hussey, who runs the Try Pots with complete command.",
    passage:{text:"Oh, sweet friends! hearken to me. It was made of small juicy clams, scarcely bigger than hazel nuts, mixed with pounded ship biscuit, and salted pork cut up into little flakes; the whole enriched with butter, and plentifully seasoned with pepper and salt.",source:"Chapter 15 — Ishmael's rapturous chowder description"},
    connections:[{id:14,note:"Their arrival at the Try Pots follows the portrait of Nantucket immediately."},{id:2,note:"The cold, disorienting New Bedford arrival contrasts with this warm Nantucket welcome."},{id:94,note:"A Squeeze of the Hand is the novel's other great moment of sensory communal pleasure."}]
  },
  16:{
    analysis:"The chapter in which the Pequod is chosen is simultaneously the chapter in which Ahab is first described — at length and with extraordinary care — before he appears. Peleg and Bildad are masterpieces of comic hypocrisy: Quaker men whose religion preaches non-violence and whose business is industrialized killing, at peace with this contradiction through elaborate rationalization. But the chapter's true centre is Ahab's studied absence: we hear about him, are warned about him, are given a physical description of terrible intensity, and still he does not come. This delay — Ahab as rumour before he is reality — is one of the novel's great theatrical choices, building dread through implication. The economic substrate of the voyage is also established: Ishmael signs for a tiny fraction of the profit, reminding us that the crew's heroism is, at bottom, wage labour.",
    passage:{text:"When I think of this life I have led; the desolation of solitude it has been; the masoned, walled-town of a Captain's exclusiveness, which admits but small entrance to any sympathy from the green country without — oh, weariness! heaviness! Guinea-coast slavery of solitary command!",source:"Chapter 16 — Peleg's description of Ahab's suffering, already hinting at the wound"},
    connections:[{id:19,note:"Elijah's warning in The Prophet deepens the dread Peleg's description has already created."},{id:28,note:"The long-deferred appearance that this chapter promises."},{id:33,note:"The Specksynder examines theoretically the question of where authority comes from."}]
  },
  17:{
    analysis:"The Ramadan chapter is a careful exercise in religious relativism through comic framing. Ishmael's mounting panic as Queequeg sits motionless for hours in meditation — culminating in his breaking down the door — is played for comedy, but the chapter's conclusion is serious: Queequeg's private devotion is his own business, and Ishmael's attempts to argue him out of it are gently dismissed. Melville dramatises the limits of well-intentioned liberal tolerance: Ishmael accepts Queequeg in theory but finds sustained religious difference alarming in practice. The chapter also establishes that the novel's universe contains multiple religious systems — Christian, pagan, Parsee, and many variants within each — none of which will be adjudicated as simply correct. The comedy of the locked door conceals a genuine theological argument.",
    passage:{text:"As Queequeg's Ramadan, or Fasting and Humiliation, was to continue all day, I did not choose to disturb him till towards night-fall; for I cherish the greatest respect towards everybody's religious obligations, never mind how comical.",source:"Chapter 17 — Ishmael's declaration of tolerance, immediately tested"},
    connections:[{id:10,note:"The genuine tolerance argued in A Bosom Friend is tested more stressfully here."},{id:83,note:"Jonah Historically Considered is another comic-serious treatment of religious devotion."},{id:9,note:"Mapple's Christianity is set in quiet contrast to Queequeg's absorbed, private paganism."}]
  },
  18:{
