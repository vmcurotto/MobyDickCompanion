    analysis:"'The Blanket' takes the whale's blubber as its subject and turns it into a sustained meditation on the relationship between outer appearance and inner reality. The blubber is both the whale's insulation (literal, functional) and something that conceals its interior nature — what Ishmael calls the whale's 'true form.' The meditation extends into physiognomy, into the philosophical question of whether anything's inner nature can be read from its surface. Melville's answer is characteristically ambivalent: surfaces do tell us something, but what they tell us is partial and always requires interpretation. The chapter also picks up the blanket/counterpane motif from Chapter 4, giving the novel's patchwork imagery its most literal expression.",
    passage:{text:"Oh, man! admire and model thyself after the whale! Do thou, too, remain warm among ice. Do thou, too, live in this world without being of it. Be cool at the equator; keep thy blood fluid at the Pole. Like the great dome of St. Peter's, and like the great whale, retain, O man! in all seasons a temperature of thine own.",source:"Chapter 68 — the whale's insulating blubber as a model for human equanimity"},
    connections:[{id:4,note:"The Counterpane: the quilt/blanket motif established there finds its most literal expression in whale blubber."},{id:42,note:"The Whiteness: the philosophical problem of what lies beneath appearances is here approached through physiology."},{id:79,note:"The Prairie: another meditation on reading the whale's exterior — the forehead, not the blanket."}]
  },
  69:{
    analysis:"'The Funeral' has the quality of a prose poem: the stripped whale carcass, set adrift and trailing blood, draws a retinue of sharks and sea birds that Ishmael compares to a mournful funeral cortege. The chapter's meditation is on the indifference of both sea and sky: the birds cry, the sharks feed, and nothing commemorates what the whale was. Ishmael imagines a later ship encountering the floating carcass and misidentifying it — a 'rock,' a 'reef' — and being wrecked on what was once a living creature. This final irony (the whale persisting as a posthumous danger) is the chapter's most quietly devastating observation: even in death and dissolution, the whale can destroy us, and we will not know what we have struck.",
    passage:{text:"Oh! the metempsychosis! Oh! Pythagoras, that in bright Greece, two thousand years ago, did die, so good, so wise, so mild; I sailed over his grave... I saw it — two and two there floated into my inmost soul, endless processions of the whale, and, midmost of them all, one grand hooded phantom, like a snow hill in the air.",source:"Chapter 69 — the whale's funeral: death, dissolution, and the danger that persists"},
    connections:[{id:67,note:"Cutting In: the industrial process whose waste product this drifting carcass is."},{id:116,note:"The Dying Whale: the contrast — a whale dying while still living, here a whale persisting in death."},{id:42,note:"The Whiteness: the whale as the 'grand hooded phantom' — the image recurs here in dissolution."}]
  },
  70:{
    analysis:"'The Sphynx' is the novel's most concentrated expression of Ahab's epistemological tragedy. Ahab addresses the severed head of the sperm whale hanging from the ship's side — a head that has, in its long life, witnessed storms, sunken ships, the deaths of other whales, the sea floor — and demands that it speak. The head has 'seen' everything; it is the novel's best possible witness; and it is absolutely silent. Ahab's long, increasingly desperate address is a speech about the impossibility of the speech he wants in return: the universe will not explain itself, the evidence will not confess, the suffering will not be given a meaning by the thing that caused it. The chapter reads as a direct response to the Book of Job — God speaking from the whirlwind, but here the whirlwind says nothing at all.",
    passage:{text:"O head! thou hast seen enough to split the planets and make an infidel of Abraham, and not one syllable is thine! Silence! What is it that thou wouldst say? Tell me all — tell me all! But what is it? I think I see it — 'tis the way; speak, thou vast and venerable head... speak, mighty head, and tell us the secret thing that is in thee.",source:"Chapter 70 — Ahab interrogates the universe and receives only silence: the problem of evil without theodicy"},
    connections:[{id:99,note:"The Doubloon: another object interrogated for meaning that yields only the interrogator's own reflection."},{id:79,note:"The Prairie: the whale's living forehead is as inscrutable as this severed head — the same silence, different form."},{id:41,note:"Moby Dick: Ahab's belief that malicious intelligence lurks behind the whale's silence is the obsession this chapter enacts."}]
  },
  71:{analysis:"Gabriel's domination of the Jeroboam shows religious fanaticism as a form of social control — his claim that Moby Dick is the Shaker God parallels and inverts Mapple's orthodox theology, and the captain's inability to challenge him despite knowing he is mad shows how quickly institutional authority can be subverted by charismatic belief. The letter Ahab receives from the Jeroboam, sealed by Gabriel and unread, becomes an omen of the doom Ahab refuses to acknowledge. The encounter is one of the novel's most pointed dramatizations of prophecy meeting obsession."},
  72:{analysis:"The monkey-rope physically embodies the novel's central philosophical claim about human interdependence: no action is truly individual, and every choice ripples through those we are attached to. Ishmael's meditation on being 'married' to Queequeg through the rope extends their friendship into a metaphysical argument about mutual fate and the impossibility of solitary existence. It is one of Melville's most direct statements that the self is always relational."},
  73:{analysis:"The comparison of the two whale heads to Locke and Kant — the sperm whale as empiricist, the right whale as idealist — is one of the novel's most audacious conceits, using natural history as a vehicle for epistemological comedy. Both heads hang from the same ship, suggesting that philosophy's great opposing systems are just different shapes of the same incomprehensible thing. The chapter also serves Fedallah's superstition that carrying both heads will ward off Moby Dick — supernatural belief and philosophical speculation running parallel."},
  74:{analysis:"Ishmael's detailed anatomical description of the sperm whale's enormous, flat-browed head is simultaneously natural history and meditation on inscrutable intelligence. The whale presents no face to read — it is all forehead, all thought, no expression — making it the perfect emblem of what cannot be known. The chapter prepares the ground for the philosophical meditation of Chapter 79 by first establishing the physical reality of what resists interpretation."},
  75:{analysis:"The right whale's head is defined by its baleen and enormous lower jaw — a creature that subsists by straining out the smallest organisms from vast quantities of water, finding something Stoic in its great patient filtering. Its expression strikes Ishmael as vaguely philosophical, almost resigned, in contrast to the sperm whale's aggressive, battering intelligence. The comparison illuminates both species by refraction."},
  76:{analysis:"The sperm whale's forehead is here revealed as a weapon of extraordinary engineering — not hollow but a solid mass of dense, specialized tissue designed to absorb and transmit impact force. Melville uses this anatomical fact to argue against the assumption that a whale's charge is accidental or panicked: the very shape of the whale's head suggests purposive violence. The chapter anticipates the Pequod's fate by making clear that Moby Dick's ramming of ships is, in the deepest sense, what it was built to do."},
  77:{analysis:"The spermaceti case atop the whale's head — the Great Heidelburgh Tun — contains the most prized oil, accessible only through a hazardous opening in the skull that makes extraction an intimate, dangerous act. Ishmael's comparison of this reservoir to a great wine barrel domesticates and complicates the image of the whale simultaneously, bringing the industrial and the convivial into uncomfortable proximity. The chapter sets up the comic catastrophe of Chapter 78."},
  78:{analysis:"Tashtego's fall into the whale's open head while extracting spermaceti and Queequeg's underwater rescue — pulling him out feet-first — are played as pure physical comedy with existential overtones. Ishmael's description of the rescue as a midwife delivering a baby inverts the usual direction of maritime violence: here the whale gives life rather than taking it. The chapter is one of the novel's most purely comic episodes, with characteristic darkness just beneath the surface."},
  79:{analysis:"Ishmael applies physiognomy — the pseudoscience of reading character from facial structure — to the whale's inscrutable brow, and immediately confronts the problem: the sperm whale has too much forehead and no face, making it the physiognomist's nightmare. The chapter argues that the whale's inscrutability is not accidental but structural — it is made to resist interpretation, its massive brow promising meaning while withholding it entirely. This becomes a figure for the novel's own resistance to definitive reading."},
  80:{analysis:"The sperm whale's brain is extraordinarily small relative to its body and skull — a tiny sphere buried deep within a massive head — and Ishmael uses this anatomical disproportion to argue that what drives the whale is not intelligence in the human sense but pure will, pure instinct operating at a terrifying scale. The chapter quietly undermines the physiognomist's project of reading brain from brow: the impressive forehead tells us nothing about what animates it. Power and intelligence are not the same thing."},
  81:{analysis:"The competitive race between the Pequod and the Jungfrau for the same whale is played as farce: the German ship runs incompetently and loses to the Pequod's superior skill. Beneath the comedy, the chapter makes its familiar structural observation that competition transforms human cooperation into zero-sum antagonism. The old whale they pursue and kill is described with unexpected pathos — blind in one eye, scarred, terribly ancient — and dies still attempting to swim away."},
  82:{analysis:"This mock-heroic catalogue of mythological whalers — Perseus, Hercules, St. George, Jonah, Vishnu — argues that all heroism is fundamentally maritime and all monsters are fundamentally whales. The irony is double: whaling is genuinely heroic and the comparison is also faintly ridiculous, and Melville wants both registers simultaneously. The grandeur and the absurdity coexist because his subject is genuinely both."},
  83:{analysis:"A satirical dispatch from the territory of biblical literalism: Ishmael, in the voice of a credulous scholarly commentator, examines the physical plausibility of Jonah's survival inside the whale, producing increasingly absurd defenses of each implausible detail. The chapter is partly a parody of religious apologetics, partly a genuine meditation on the relationship between faith and evidence. The comedy is light, but the underlying question — can the miraculous and the empirical coexist? — is one the whole novel is asking."},
  84:{analysis:"The scene of Flask pitchpoling a whale — throwing the lance from a lurching, galloping whaleboat — is a tour de force of physical description; Melville renders the difficulty and violence of the act with careful technical admiration. The chapter also functions as a character study of Flask, who performs his brutal competence without reflection or scruple. Like many of the novel's action chapters, the vivid surface conceals a moral observation: this is what efficiency and thoughtlessness look like at their most impressive."},
  85:{analysis:"The chapter extends the cetological project to the whale's spout, which Ishmael refuses to explain definitively — it might be water, might be vapor, might be something else entirely — and then turns the spout into a figure for thought itself: the intellectual efforts of great minds rising into the world as visible vapor, briefly illuminated, then dissolving. The comparison of Descartes, Locke, and Kant to spouting whales is both comic and entirely serious. The meditation ends in genuine mysticism about the relationship between inspiration and intelligence."},
  86:{analysis:"The lyrical catalogue of the whale's tail — its power, its expressiveness, its devastating beauty — is one of the novel's purest moments of admiring description, and also one of its most honest acknowledgments of the limits of observation. Ishmael can describe everything the tail does and still not explain what the tail is; the descriptions accumulate into something that exceeds the sum of their parts. The chapter closes with a confession of failure that is also a celebration: we cannot know the whale, and this unknowability is itself magnificent."},
  87:{analysis:"The miraculous calm at the center of the pursuing whale herd — where nursing mothers and calves move in slow, unbothered intimacy — is the novel's closest approach to a vision of pure peace, embedded in the middle of violence and pursuit. The structural irony is perfect: Ishmael finds the novel's only sustained image of domestic tenderness while harpooned to a whale, in a whaleboat surrounded by chaos. The chapter suggests that beauty and peace are always available at the center of what we pursue, if we could only stop long enough to notice them."},
  88:{analysis:"Ishmael's survey of whale social structures uses the language of Victorian social comedy to describe whale mating and hierarchy, gently lampooning both the whales and the human society they're being compared to. The old bull guarding his harem until superseded by younger males is a figure both dignified and poignant, and the anthropomorphism is deliberate and knowing. The chapter's gentle satire works in both directions simultaneously."},
  89:{analysis:"The whaling property law distinction between 'fast fish' (claimed) and 'loose fish' (available) becomes, in Ishmael's hands, a devastating critique of all forms of possession and exploitation. By the end of the chapter everything has been a fast fish to someone — the whale, the slave, the colonized territory — and 'loose fish' turns out to mean simply 'not yet taken.' The tone is deceptively light and the argument quietly radical, one of the novel's sharpest political passages."},
  90:{analysis:"The absurdity of English law requiring the head and tail of every caught whale be presented to the Crown is used as a lever to pry open the arbitrary nature of legal authority generally. The satire is mild but pointed: the law exists because it can, not because it makes sense, and the power to enforce arbitrary rules is itself a form of violence. The chapter continues the novel's running commentary on the relationship between law and the whaling industry."},
  91:{analysis:"Stubb's successful con of the French captain — persuading him to abandon a foul whale that secretly contains valuable ambergris — is the novel's most purely comic swindle, played with perfect deadpan. The chapter makes a characteristically Melvillean point about value and appearances: the most disgusting surface contains the most precious substance, and commerce navigates between the repulsive and the desirable without hesitation or sentiment."},
  92:{analysis:"The essay on ambergris — beautiful-smelling, precious, formed inside the diseased intestines of whales — is the novel's most concentrated irony about value and origin. Everything most refined and lovely in civilization is extracted from something violent, ugly, or diseased; the perfume that graces aristocratic wrists comes from a sick whale's bowel. The observation about the hidden costs of luxury and the distance between production and consumption lands with quiet, lasting force."},
  93:{analysis:"Pip's abandonment in the open ocean is the novel's most purely tragic event, and his subsequent madness is described by Ishmael with particular awe: he has seen 'God's foot upon the treadle of the loom,' directly encountering the machinery that Ishmael elsewhere meditates on at a careful philosophical remove. His recovery into a kind of holy fool — toward whom Ahab shows his only genuine tenderness — makes him both the novel's most pitiable character and one of its most spiritually authoritative. The racial dimension of his abandonment is explicit in the text and devastating."},
  94:{analysis:"The communal hand-squeezing of congealed sperm oil is the novel's most utopian passage: involuntary, cross-racial physical contact produces a brief moment of genuine communion that erases, for a moment, the hierarchies and antagonisms of ship life. Ishmael imagines, extravagantly, remaining forever in this state of warm involuntary togetherness. The chapter is both quietly comic and one of the novel's most earnest expressions of what human solidarity might feel like."},
  95:{analysis:"The chapter's joke — a whale's foreskin fashioned into a garment for the mincer, compared to a bishop's vestments — is the novel's broadest bawdy comedy, but the satirical point beneath it is consistent: religious ceremony and industrial process are not as different as we assume. The mincer performs a priestly function dressed in equipment that makes the comparison visible, and Melville's deadpan prevents it from being merely shocking. The irony is structural, not just ribald."},
  96:{analysis:"The night chapter at the try-works — the ship converted to a floating factory, lit by the hellish glow of rendering blubber, crewed by figures that look demonic in the firelight — is one of the novel's great set-pieces of psychological horror. Ishmael falls asleep at the helm and nearly capsizes the ship, waking facing the wrong direction: a figure for the danger of sustained contact with the infernal. The meditation that follows argues that one can look too directly at darkness, and that some wisdom requires turning away from the fire and navigating by stars instead."},
  97:{analysis:"This brief chapter offers one of the novel's quietest ironies: whalers work in darkness to bring oil light to the world, and are probably the last people who still use tallow candles themselves. The inversion is characteristic Melville — the producers of civilization's illumination are kept in the dark. The observation about labor, knowledge, and who benefits from whose work is precise and carries more weight than the chapter's brevity suggests."},
  98:{analysis:"After the hellish try-works sequence, the practical labor of cleaning and stowing brings the ship back to order in a brief, almost domestic account of restoration. The cycle — whale killed, blubber rendered, oil stored, ship cleaned — compresses the entire whaling process into its recurring pattern of chaos and recovery. The temporary order achieved by cleaning suggests both the resilience and the futility of the crew's efforts: it will all have to be done again."},
  99:{analysis:"The gold doubloon nailed to the mast as reward for first sighting Moby Dick becomes an object of philosophically structured interpretation: each character — Ahab, Starbuck, Stubb, Flask, the Manxman, Queequeg, Fedallah, Pip — reads its engravings according to his own nature, and the accumulation of incompatible readings makes the novel's epistemological argument explicit. Meaning is not in the object but in the observer. Pip's reading — 'I look, you look, he looks; we look, ye look, they look' — reduces all interpretation to a grammatical exercise and is the most honest account of what has happened."},
  100:{analysis:"Captain Boomer of the Samuel Enderby lost his arm to Moby Dick and chose to accept the loss and sail home; his equanimity is a direct dramatic foil to Ahab's obsession. The contrast is structurally important: Boomer proves that the whale can be survived, that acceptance is possible, that obsession is a choice as much as a wound. Ahab's refusal of this perspective — his inability to see Boomer's peace as anything but cowardice — reveals that the obsession has by now consumed all other possible responses."},
  101:{analysis:"A warm, expansive essay on the history of the Samuel Enderby firm and on the pleasures of good drink and good fellowship among sailors, offering a tonal pause from darkness. The history of the English whaling industry embedded here is genuinely informative, but the chapter's primary function is atmospheric: a breath of ordinary life and simple pleasure before the final descent into obsession and catastrophe."},
  102:{analysis:"Ishmael's memory of the whale skeleton on the South Sea island — now a sacred site, overgrown with vegetation, so that life has colonized and transformed the emblem of death — offers a vision of the natural world's ultimate indifference to our categories of the sacred and the dead. The native people worship it; the vegetation covers it; the whale persists as structure long after its life has ended. The chapter is one of Melville's most genuinely beautiful set-pieces and contributes to the sustained meditation on death and natural process."},
  103:{analysis:"Ishmael's attempt to record the whale's exact measurements from memory while Tashtego watches skeptically is a comedy of epistemological ambition and its inevitable failure. The gap between the living whale and the recorded numbers is the gap the whole novel has been exploring: no representation — anatomical, artistic, verbal — can fully contain its subject. The chapter's comic acknowledgment of this failure is part of the novel's larger self-awareness about what language can and cannot do."},
  104:{analysis:"The existence of fossil whales — hundreds of millions of years old, predating most of the life we know — places human history in a geological perspective that reduces civilizations to footnotes. The whale's temporal scale is the chapter's real subject: a creature that has survived ice ages, mass extinctions, and the entire span of human existence is not easily categorized as prey. Ishmael uses this perspective both to celebrate the whale's dignity and to quietly undercut human confidence in our own permanence."},
  105:{analysis:"Ishmael's argument that the whale cannot be exterminated by human hunters because the ocean is simply too large is argued with genuine conviction — and turned tragic by history. The confidence here is movingly wrong, and Melville's meditation on the whale's inexhaustibility is itself a kind of love poem to a creature that had no idea it needed defending. The chapter's irony, visible only from our vantage point, gives it the quality of an elegy despite its optimistic argument."},
  106:{analysis:"The discovery that Ahab's ivory leg was damaged, requiring a new one, briefly draws Starbuck's attention to the question of whether Ahab is physically and mentally fit for command. The scene is brief but important: Starbuck sees a clear moment of professional crisis and fails to act on it, anticipating his larger failure at the musket. The chapter focuses attention on the physical cost obsession is extracting from Ahab's own body, turning the captain's instrument of defiant mobility into evidence of his deterioration."},
  107:{analysis:"The Pequod's carpenter is one of the novel's most distinctive minor characters: a man of extraordinary practical competence who approaches all of existence as a problem to be solved without asking why. His equanimity is not wisdom but its opposite — the refusal of all meaning-making — and Melville treats it with gentle satirical admiration. He is the anti-Ahab: where Ahab demands meaning from a universe that provides none, the carpenter accepts the universe's silence and finds it entirely comfortable."},
  108:{analysis:"The dialogue between Ahab and the carpenter over the construction of a new ivory leg is the novel's sharpest comedy of contrasting registers: Ahab speaks metaphysically, the carpenter responds literally, and neither can entirely hear the other. Ahab's monologue about wanting to be made whole — to have a complete body — is one of his most nakedly vulnerable passages. The carpenter's cheerful incomprehension of this need is not cruelty but the comic emptiness of practical intelligence meeting metaphysical hunger."},
  109:{analysis:"The cabin confrontation is the novel's most dramatically tense scene: Starbuck makes a professional, reasonable case for turning back to address leaking oil casks, and Ahab responds with such overwhelming psychological force that Starbuck retreats. The scene proves that rational argument cannot reach Ahab, and shows us why: his obsession is operating at a register that ordinary persuasion simply cannot access. Starbuck's moral paralysis here — the first of his two great failures — is the novel's central tragic turning point."},
  110:{analysis:"Queequeg's illness and his calm, practical preparation of his own coffin — specifying its dimensions, having it built to his satisfaction — is one of the novel's most quietly extraordinary passages. His subsequent unexplained recovery, and the coffin's transformation into a sea chest and ultimately a life preserver, gives the object a symbolic weight that the novel will cash at its conclusion. The chapter is also the novel's warmest sustained portrait of Queequeg's character: his dignity, his self-possession, and his relationship with mortality."},
  111:{analysis:"The brief lyrical chapter on the Pacific functions as a meditation on scale and antiquity: this is the oldest ocean, barely touched by Western civilization at its edges, immeasurably vast and ancient at its center. The chapter participates in the novel's sustained romantic engagement with the oceanic as a figure for what exceeds human comprehension. It also serves as a quiet structural marker: the Pequod has entered the waters where Moby Dick lives, and the geography of the novel's ending has been reached."},
  112:{analysis:"Perth's backstory — a skilled craftsman who lost his family to drink and debt and came to sea not for adventure but for oblivion — makes him one of the novel's most sympathetically drawn minor figures. The sea as a destination for the ruined and the grieving is a theme running through many of the crew members' histories. Perth's skill remains even as everything else was taken from him; the chapter asks what it means to have a craft but no life to use it in."},
  113:{analysis:"Ahab's commissioning of a special harpoon — quenched in the blood of the three pagan harpooners rather than water, explicitly inverting Christian baptism — is the novel's most theatrical ritual of dark dedication. The scene's Gothic machinery is deliberate and self-aware: Ahab knows he is performing a rite, and the crew's participation makes it their collective act as well as his individual obsession. The baptismal inversion names what the voyage has become: a counter-religious crusade conducted with full ceremonial awareness."},
  114:{analysis:"The extraordinary golden afternoon at sea — where the water seems to turn to gold and the whole world achieves a momentary uncanny beauty — is shared by Ahab, Starbuck, and Stubb, each of whom responds differently. Stubb is simply pleased; Starbuck is moved to peaceful longing; Ahab turns it into a meditation on how beauty cannot alter his purpose. The contrast is the chapter's point: the same world offers peace or its refusal depending entirely on what the observer has already decided."},
  115:{analysis:"The homebound Bachelor, flush with success and celebrating wildly, is the novel's clearest image of everything the Pequod has turned away from: profit, pleasure, completion, homecoming. The Bachelor's captain has not seen Moby Dick and doesn't believe in it; his cheerful skepticism is the rational response Ahab cannot afford to make. Ahab's refusal to celebrate or even speak turns the scene into a moral tableau: obsession and ordinary happiness passing each other in opposite directions."},
  116:{analysis:"The dying whale's final gesture — turning its head to face the sun — strikes Ahab as a dark omen, and he meditates on it with the private intensity of a man reading everything for confirmation of his fate. The chapter shows Ahab in his most contemplative mode: not commanding or defying but watching and interpreting. His willingness to find dark meaning in a dying whale's instinctive movement toward light reveals how completely obsession has colonized his interpretive faculties."},
  117:{analysis:"Fedallah's whispered prophecy to Ahab about the conditions of his death — hemp alone can kill him, he will see two hearses before he dies — establishes the prophetic framework that the final chapters will fulfill. The prophecy is designed to be misread by Ahab as comforting, since its conditions seem impossible at sea, and is in fact a precise description of what will happen. The chapter performs the classic prophetic function: speaking truth in a form the listener cannot understand until it is too late."},
  118:{analysis:"Ahab's destruction of the quadrant — his primary navigational instrument — in a rage at its inability to tell him where he will be in the future is the most explicit act of his rejection of rational guidance. He will navigate by dead reckoning and sheer will without the external check that objective measurement provides. The act is simultaneously magnificent and mad: Ahab at his most Promethean and his most self-destructive, removing every instrument except his own obsession."},
  119:{analysis:"The St. Elmo's fire blazing from the mastheads in the storm is the novel's most spectacular supernatural set-piece, and Ahab's response — claiming the fire as his own, defying it as an omen, turning it into confirmation of his dark divinity — is his most grandiose speech. Starbuck and the crew are terrified; Ahab is exhilarated. The scene shows how completely Ahab has inverted the normal human relationship to natural power: where others see a warning, he sees a mirror and a coronation."},
  120:{analysis:"This brief chapter records Ahab's command to navigate by stars rather than the now-unreliable compass, making a structural point in miniature: all external guides are failing, and Ahab is driving the ship by direct reckoning — his own will aimed at a fixed point in the sky. Even in its brevity, the chapter registers the acceleration of the novel's pace toward its conclusion. The stars replace the instrument; the obsession replaces the stars."},
  121:{analysis:"Stubb and Flask's brief nocturnal exchange — anxious, brief, unable to say what both of them feel about what is coming — captures the crew's growing terror as the novel's end approaches. The chapter is almost purely atmospheric: two men in the dark unable to speak the thing they know. In the context of the novel's grand rhetoric, this small frightened silence has a particular force, the speechlessness of ordinary men confronting something beyond ordinary speech."},
  122:{analysis:"The chapter's extreme brevity — a few lines, almost nothing — captures a moment of pure action and pure defiance: Tashtego nailing a flag through a thunderstorm. The gesture is purely mechanical and purely resistant, and the chapter's compression mirrors the final tightening of the novel's structure as the end approaches. It is the shortest chapter and one of the most structurally meaningful: the world is nearly beyond words now."},
  123:{analysis:"Starbuck's vigil with the loaded musket over the sleeping Ahab is the novel's most agonizing portrait of moral paralysis. He has everything he needs to save the ship and the crew, and he does nothing; the reasons he gives himself are rationalizations for the deeper reason, which is that Ahab's authority has become, for Starbuck, a form of fate that cannot be resisted without becoming a murderer. The chapter is Melville's indictment of institutional compliance and the failure of moral courage under the pressure of legitimate-seeming authority."},
  124:{analysis:"The discovery that the storm reversed the compass needle, and Ahab's construction of a new one from a sail needle and a lance, is another act of Promethean self-sufficiency that is also a symptom of his total isolation. Ahab makes a compass that points correctly, impressing the crew — but the feat is also a further removal of any external check on his navigation. He has made himself the instrument of his own reckoning, accountable to nothing outside himself."},
  125:{analysis:"The log and line — the ship's instruments for measuring its own speed and position — have rotted from disuse, having gone unchecked while Ahab pursued his obsession. The near-accident when a sailor is pulled overboard trying to recover them is a figure for the general decay of the practical ship underneath the obsessive captain. The instruments of ordinary navigation are as neglected as Starbuck's moral authority; the ship is running on obsession alone."},
  126:{analysis:"A sailor's cry in the night, the loss of the life-buoy, and its replacement by Queequeg's coffin form a chain of events that feels fated: the thing built to preserve Queequeg's life in death now becomes the ship's general instrument for preserving life. The circle of associations around the coffin tightens as the novel nears its end. The carpenter's matter-of-fact conversion of the coffin to a life preserver — just another practical problem — contrasts with the enormous symbolic weight the object has accumulated."},
  127:{analysis:"Ahab's brief dialogue with the carpenter about the coffin-turned-life-buoy is almost entirely deadpan on the carpenter's side and weighted with unbearable meaning on Ahab's. The carpenter sees only a useful object that has been repurposed; Ahab sees the novel's complete symbolic architecture compressed into a single piece of wood. Their inability to hear each other across this gulf is characteristic of their exchanges throughout, the practical and the metaphysical moving in parallel without contact."},
  128:{analysis:"Captain Gardiner's desperate plea for Ahab to help search for the whaleboat carrying his young son is the novel's most explicit moral test, and Ahab fails it completely. His refusal is not callous but focused: he genuinely cannot afford to be diverted, and this inability to be diverted is exactly the measure of what the obsession has done to him as a human being. The Rachel's departure — the ship that will later rescue Ishmael — names the chapter's theme: Rachel weeping for her children, refusing to be comforted."},
  129:{analysis:"As the final days approach, Ahab increasingly retreats into his cabin and into himself, the chapter recording his progressive withdrawal from the social world of the ship. The isolation that has been structural throughout the voyage becomes literal and physical: he is separating himself from the crew he is leading toward destruction. The cabin is the obsession's last redoubt, and Ahab retreats to it as the world outside grows more insistent."},
  130:{analysis:"The sea-hawk's theft of Ahab's hat — his authority's literal emblem, taken by a creature of air and dropped into the sea — is the chapter's quiet omen, read in silence by Fedallah whose eyes never leave the captain. Omens accumulate in the final chapters without breaking the novel's surface into explicit supernaturalism; they work by weight and accumulation rather than direct statement. The chapter sustains the atmosphere of imminent disaster while Ahab continues to hold his course."},
  131:{analysis:"The Delight carries fresh evidence of Moby Dick's power: a shattered harpoon that could not kill it, five men recently dead and buried at sea. Ahab asks whether the white whale can be killed and receives a wordless answer — the broken iron held up — that any reasonable person would take as definitive. He turns away. The encounter is the final warning in the novel's series of warned meetings, and the ship's name — the Delight — is the final irony before the catastrophe."},
  132:{analysis:"On a day of extraordinary serenity, Ahab speaks with sudden, unexpected tenderness to Starbuck — and nearly relents. He weeps, remembers his wife and child, and comes as close as he ever will to turning back. The conversation is the novel's most tender and most devastating: Starbuck almost reaches him, the human connection is almost enough, and then it is not. Ahab re-commits in a speech that makes clear he understands his situation completely and cannot change course regardless. His wife and the world's beauty are real; the obsession is stronger than both."},
  133:{analysis:"The sighting of Moby Dick and the beginning of the three-day chase launches the novel's endgame with remarkable physical immediacy — Ahab himself sights the whale first and descends to command the boats personally. Fedallah's boat is destroyed; Ahab's is smashed to splinters; the crew swims among wreckage in a darkening sea. The whale is everywhere and dominates everything; the chapter establishes its overwhelming physical and psychological presence before the final reckoning."},
  134:{analysis:"The second day's chase ends with the discovery of Fedallah's body lashed to the whale by tangled harpoon lines — the prophet wound around the creature whose fate he predicted, fulfilling his prophecy of the 'first hearse.' The image is the novel's most Gothic: the dead man wrapped around the living whale, returning to the surface as both warning and fulfillment. Ahab, who took comfort from the prophecy's apparently impossible conditions, now sees them clicking into place around him."},
  135:{analysis:"The final day begins with Ahab's most concentrated meditation on necessity and will — he knows what is coming and goes forward anyway, the obsession now indistinguishable from fate. Moby Dick turns and rams the Pequod, which sinks; Ahab is caught in the harpoon line and dragged under instantly; every soul is lost except Ishmael, who floats on Queequeg's coffin-turned-life-buoy until the Rachel — returning to search for her lost — finds him instead. The Epilogue's epigraph from Job completes the novel's theological frame: 'And I only am escaped alone to tell thee.'"},

    id:"transcend",title:"Transcendentalism",preview:"The American philosophical movement that shaped — and was challenged by — Melville.",
    content:`<h3>What It Was</h3>
<p>Transcendentalism was a philosophical and literary movement that flourished in New England from roughly the 1830s through the 1860s. Its central figures were Ralph Waldo Emerson and Henry David Thoreau, along with Margaret Fuller, Bronson Alcott, and others who gathered around them in Concord, Massachusetts.</p>
<p>At its heart, Transcendentalism held that the physical world was a manifestation of a deeper spiritual reality — what Emerson called the "Oversoul." This divine presence was accessible not through institutional religion or rational argument, but through direct, personal, intuitive experience — most easily found in nature. Every person carried a divine spark; every individual was capable of direct communion with the infinite.</p>
<h3>What It Believed</h3>
<p>The movement was optimistic, individualistic, and deeply American. It held that human beings were naturally good, that society and its institutions tended to corrupt them, and that self-reliance and communion with nature were the paths to truth. Emerson's famous essays — "Self-Reliance," "Nature," "The Over-Soul" — laid out this vision with extraordinary rhetorical power.</p>
<h3>Melville's Response</h3>
<p>Melville knew this tradition intimately and found it insufficient. He was close to Hawthorne (himself a skeptic), and the two writers shared a sense that Emerson's sunny optimism evaded the hardest truths about human existence. Where Emerson saw Nature as spiritually affirmative, Melville saw the ocean — untameable, indifferent, capable of swallowing the innocent — as the more honest face of the natural world.</p>
<p>Moby-Dick is in constant dialogue with Transcendentalism. The famous mast-head chapter warns explicitly against losing oneself in transcendental reverie while on watch — the consequence is death. The "Grand Armada" chapter offers a genuine transcendental vision but surrounds it with violence. And the whiteness of the whale — which should, on Transcendentalist terms, represent purity and spiritual presence — instead evokes existential terror.</p>
<div class="quote-block">"Whenever I find myself growing grim about the mouth; whenever it is a damp, drizzly November in my soul; whenever I find myself involuntarily pausing before coffin warehouses, and bringing up the rear of every funeral I meet; and especially whenever my hypos get such an upper hand of me, that it requires a strong moral principle to prevent me from deliberately stepping into the street, and methodically knocking people's hats off — then, I account it high time to get to sea as soon as I can." — Chapter 1</div>`

    content:`<h3>The Calvinist World</h3>
<p>New England was founded by Puritans who believed fervently in the theology of John Calvin. Though Calvinist orthodoxy had softened considerably by Melville's time, its assumptions about God, sin, and fate were still deeply embedded in American culture — especially in the Quaker communities (like those of Nantucket) that Melville wrote about.</p>
<p>Central to Calvinism is the doctrine of predestination: God has already determined, before the creation of the world, who will be saved (the "elect") and who will be damned. This is not based on foreseen merit — no one can earn salvation — but on God's sovereign, inscrutable will. Human beings are radically depraved and incapable of choosing good without divine grace.</p>
<h3>Why It Matters for Moby-Dick</h3>
<p>Father Mapple's sermon (Chapter 9) is the novel's clearest statement of Calvinist theology: God is just, His commands are absolute, human resistance is futile, and the only dignified response is radical obedience. "Delight is to him — a far, far upward, and inward delight — who against the proud gods and commodores of this earth, ever stands forth his own inexorable self."</p>
<p>Ahab can be read as a Calvinist anti-hero: he experiences the universe as governed by a malevolent predetermined will — and rather than submitting, he rebels. His rebellion is magnificent and doomed. Whether God or the universe is actually malevolent, the novel refuses to say.</p>
<p>The Pequod's co-owners Peleg and Bildad are comically Quaker — their theology of non-violence sits awkwardly alongside the violence of the whaling industry, a hypocrisy the novel notes with quiet amusement. Starbuck's Quaker faith is more sincere and more tragic.</p>
<h3>Predestination vs. Free Will</h3>
<p>Calvinist predestination is the theological version of the fate/free will tension that runs through the entire novel. The mat-making metaphor of Chapter 47 — fate as loom, free will as weaver, chance as the sword — is Melville's attempt to hold these forces in balance without resolving them into either full determinism or full human freedom.</p>`

    content:`<h3>European Romanticism</h3>
<p>Romanticism was the dominant European literary and artistic movement of the late 18th and early 19th centuries, a reaction against Enlightenment rationalism and the Industrial Revolution. Where the Enlightenment prized reason, order, and universality, Romanticism prized emotion, imagination, individuality, and the sublime — the terrifying grandeur of nature that dwarfs human scale.</p>
<p>Key figures include Goethe, Byron, Shelley, Keats, Wordsworth, Coleridge, and in America, Poe and Hawthorne. Their heroes were often isolated individuals of extraordinary passion who came into conflict with society or the cosmos itself.</p>
<h3>The Byronic Hero</h3>
<p>The "Byronic hero" — named for Lord Byron, who both created and embodied the type — is an aristocratic, darkly charismatic, psychologically wounded figure who operates outside conventional morality. He is brilliant, passionate, self-destructive, and utterly compelling. He suffers from some mysterious inner wound that drives him toward extremes.</p>
<p>Ahab is explicitly the American Byronic hero. His ivory leg, his scar, his brooding isolation, his magnificent speeches, his tragic grandeur — these are all Romantic conventions. But Melville uses these conventions to make a darker point: the Romantic hero is socially catastrophic. Ahab's greatness destroys everyone around him.</p>
<h3>Sublime and Terrifying Nature</h3>
<p>The Romantic tradition's "sublime" — nature as overwhelming, beautiful, and terrifying — is everywhere in Moby-Dick. The ocean, the white whale, the storm in Chapter 119, the fire at the try-works — all are sublime in the technical sense. But where Romantic sublimity often ultimately affirms human transcendence (we feel small but are elevated by that feeling), Melville's sublime offers no such consolation. The whale is beautiful and it kills you.</p>

  {
    id:"whaling",title:"The Whaling Industry in the 1800s",preview:"The dangerous, global industry that made New England rich and gave Melville his world.",
    content:`<h3>An Industry That Lit the World</h3>
<p>Before petroleum, the world ran on whale oil. Sperm whale oil was the finest lubricant available for industrial machinery and burned cleaner than any alternative in lamps. Spermaceti — the waxy substance from the whale's head — made the best candles. Whalebone (baleen) stiffened corsets and umbrella ribs. Ambergris perfumed the world's finest fragrances. The whaling industry was not peripheral; it was foundational to 19th-century civilization.</p>
<h3>Nantucket and New Bedford</h3>
<p>The American whaling industry was centered on two Massachusetts ports: Nantucket, an island settled by Quakers whose moral seriousness and commercial acumen made them ideal whalers, and New Bedford, which by the 1840s had overtaken Nantucket as the industry's capital. These were genuinely wealthy cities — New Bedford was one of the richest per-capita cities in America.</p>
<p>Whaling voyages typically lasted three to four years. Ships would circumnavigate the globe, hunting in the Pacific, Indian, and Arctic Oceans. The industry employed tens of thousands of men and supported extensive shore-side infrastructure: rope-works, cooperages, chandleries, and the counting houses of merchants.</p>
<h3>The Work and Its Dangers</h3>
<p>Whaling was extraordinarily dangerous. Men were lowered from the ship in small open boats (whaleboats) to hunt creatures that could be sixty feet long and weigh sixty tons. The killing was done with hand-thrown harpoons and lances — killing a large whale could take hours of exhausting, terrifying effort. Ships could be stove and sunk by harpooned whales (this actually happened; the Essex was sunk by a sperm whale in 1820, inspiring the novel's climax).</p>
<p>The crew was multicultural by necessity: Nantucket and New Bedford drew sailors from around the Atlantic world, including significant numbers of African Americans, Native Americans (particularly the Gay Head Wampanoag, renowned as whalers), Portuguese sailors from the Azores, and Pacific Islanders.</p>
<h3>Melville's Experience</h3>
<p>Melville sailed on the whaling ship Acushnet from January 1841, deserting ship in the Marquesas Islands in 1842. His direct experience of the work, the ship's hierarchy, and the cultures he encountered gave Moby-Dick its extraordinary specificity. The novel's technical descriptions are largely accurate — Ishmael genuinely knows how blubber is rendered, how harpoons are thrown, how the whale line works.</p>`

    id:"biblical",title:"Biblical Allusions in Moby-Dick",preview:"From Jonah to Job to King Ahab — the novel is soaked in scripture.",
    content:`<h3>A Novel of Biblical Scale</h3>
<p>Melville was raised in a Calvinist household and knew the Bible deeply. Moby-Dick is saturated with Biblical allusion — not to decorate, but to place the novel's questions on the largest possible scale. The characters and situations of the Hebrew Bible provide the framework within which Melville meditates on God, fate, suffering, and rebellion.</p>
<h3>Jonah</h3>
<p>Father Mapple's sermon (Chapter 9) retells the story of Jonah, who fled from God's command to prophesy, was swallowed by a "great fish," and emerged converted to obedience. The sermon uses Jonah to assert that flight from divine will is impossible and that submission is the only dignified response to God's authority. Ahab is Jonah in reverse: where Jonah eventually submits, Ahab never does. The novel keeps this question open: is Ahab's defiance heroic or damning?</p>
<h3>Ahab the King</h3>
<p>The Biblical Ahab (1 Kings 16-22) was a wicked king of Israel who, influenced by his wife Jezebel, worshipped Baal and persecuted the prophet Elijah. He was killed in battle after refusing a prophet's warning. The parallels are deliberate: Captain Ahab is named for a man who defied God, pursued evil, and died anyway. The character Elijah in Chapter 19 — who warns Ishmael about Ahab — echoes the Biblical prophet of the same name.</p>
<h3>Job</h3>
<p>The Book of Job — in which a righteous man is subjected to undeserved suffering and demands an answer from God — is perhaps the deepest Biblical influence on the novel. Like Job, Ahab demands that the universe account for its cruelty. Unlike Job, Ahab does not accept God's answer (the sublime, unanswerable display of power in the whirlwind). Ahab insists on personal grievance and refuses cosmic consolation. Pip's divine madness after being abandoned at sea echoes the mysterious speech from the whirlwind: he has seen too much and cannot unsee it.</p>
<h3>Ishmael</h3>
<p>The Biblical Ishmael (Genesis 16-21) was Abraham's son by the slave Hagar, cast out into the wilderness when Isaac was born. He became the progenitor of the Arab peoples. The name signals the outcast, the exile, the one who survives outside the covenant. Melville's Ishmael is similarly an outsider who survives the disaster that consumes everyone else — rescued, crucially, by a coffin that becomes a life-buoy, a resurrection figure.</p>`
  },
  {
    id:"melville",title:"Melville: Biography & Literary Context",preview:"Who Herman Melville was, what he'd done, and why this book nearly ended his career.",
    content:`<h3>Early Life and Adventures</h3>
<p>Herman Melville was born in New York City on August 1, 1819, into a family that had known prosperity and had then lost it. His father, Allan Melville, went bankrupt and died in 1832, leaving the family in financial distress. This early experience of social fall would mark Melville's work permanently: the question of how an individual survives the loss of stability and meaning is everywhere in his fiction.</p>
<p>Unable to complete formal education, Melville went to sea at nineteen. He sailed on a merchant vessel to Liverpool (the material for his novel Redburn, 1849), then in 1841 shipped on the whaling vessel Acushnet from New Bedford. He deserted ship in the Marquesas Islands, spent several weeks among the Typee people (material for his first novel, Typee, 1846), spent time in Tahiti and Hawaii, and eventually sailed home on a U.S. Navy ship.</p>
<h3>Early Success and Growing Ambition</h3>
<p>Typee (1846) and its sequel Omoo (1847) were popular successes — adventure narratives of life among Pacific Islanders. Melville was suddenly famous as "the man who lived among cannibals." But he grew restless with the constraints of popular adventure fiction and began reaching for something larger. Mardi (1849) was his first attempt at a philosophical novel; it baffled readers. Redburn and White-Jacket (both 1849) were more conventional and sold better.</p>
<h3>The Friendship with Hawthorne</h3>
<p>In the summer of 1850, while living in Pittsfield, Massachusetts, Melville met Nathaniel Hawthorne — already famous for The Scarlet Letter. The friendship transformed Melville. He read Hawthorne's essays and felt understood for the first time; Hawthorne seemed to share his sense that American literature needed to go deeper, to confront darkness and ambiguity rather than offering easy optimism. Melville dedicated Moby-Dick to Hawthorne "in token of my admiration for his genius."</p>
<p>During the composition of Moby-Dick, Melville also published his famous essay "Hawthorne and His Mosses" (1850), in which he argued for the necessity of a dark, serious American literature — "the power of blackness" — against the demands for cheerful optimism. This essay is, in many ways, the manifesto Moby-Dick puts into practice.</p>
<h3>Moby-Dick and Its Failure</h3>
<p>Moby-Dick was published in October 1851. Reviews were mixed and sales were disappointing. The novel's philosophical ambition, its narrative digression, and its refusal to provide conventional satisfactions puzzled and alienated many readers. Melville's subsequent novel Pierre (1852) was a critical disaster. He spent the rest of his working life in relative obscurity, supporting himself partly by lecturing and eventually by working as a customs inspector in New York (1866-1885).</p>
<p>He continued to write — the short fiction of the 1850s ("Bartleby, the Scrivener," "Benito Cereno") and the late novella Billy Budd, Sailor (written in his final years, published posthumously in 1924) are now recognized as masterpieces. But he died in 1891 essentially forgotten. The "Melville revival" of the 1920s brought Moby-Dick back to attention, and by the mid-20th century the novel had been recognized as one of the greatest works in the English language.</p>
<div class="quote-block">"Until I was twenty-five, I had no development at all. From my twenty-fifth year I date my life. Three weeks have scarcely passed, at any time between then and now, that I have not unfolded within myself." — Melville, letter to Hawthorne, 1851</div>`
  },
];

function CheckIcon(){return(<svg viewBox="0 0 12 10"><polyline points="1,5 4,8 11,1" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>);}

function ToneTag({tone}){return <span className={`tag ${TONE_COLORS[tone]||'tag-narrative'}`}>{tone}</span>;}

function ThemeTag({tid,onClick}){
  const t=THEME_MAP[tid];if(!t)return null;
  return <span className="tag tag-theme" style={{cursor:onClick?'pointer':'default',color:t.color,borderColor:t.color+'44'}} onClick={onClick?()=>onClick(tid):undefined}>{t.label}</span>;
}

// ── DASHBOARD ────────────────────────────────────────
function Dashboard({readSet,notes,setSection,setJumpChapter}){
  const total=CHAPTERS.length;
  const read=readSet.size;
  const pct=Math.round(read/total*100);
  const themesEncountered=useMemo(()=>{
    const s=new Set();
    CHAPTERS.filter(c=>readSet.has(c.id)).forEach(c=>c.themes.forEach(t=>s.add(t)));
    return s;
  },[readSet]);
  const today=new Date();
  const cotdId=(today.getFullYear()*366+today.getMonth()*31+today.getDate())%total;
  const cotd=CHAPTERS[cotdId];
  const recentNotes=useMemo(()=>
    Object.entries(notes).filter(([,v])=>v.trim()).slice(0,5).map(([id,text])=>{
      const c=CHAPTERS.find(ch=>ch.id===parseInt(id));
      return c?{ch:c,text}:null;
    }).filter(Boolean),[notes]);

  return(
    <div>
      <div className="section-header">
        <h2>Reading Dashboard</h2>
        <p>Your progress through Herman Melville's Moby-Dick</p>
      </div>

      <div className="cotd-card">
        <div className="cotd-label">⚓ Chapter of the Day</div>
        <div className="cotd-num">Chapter {cotd.id} — {cotd.title}</div>
        <div style={{display:'flex',gap:'.5rem',margin:'.5rem 0',flexWrap:'wrap'}}>
          <ToneTag tone={cotd.tone}/>
          {PHIL_CHAPTERS.has(cotd.id)&&<span className="tag tag-phil-badge">Essential</span>}
        </div>
        <div className="cotd-summary">{cotd.summary}</div>
        <button className="back-btn" style={{marginTop:'1rem',marginBottom:0}} onClick={()=>{setJumpChapter(cotd.id);setSection('chapters');}}>Open in Chapter Guide →</button>
      </div>

      <div className="dash-grid">
        <div className="stat-card">
          <div className="stat-num">{read}</div>
          <div className="stat-label">Chapters Read</div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
          <div style={{fontSize:'.78rem',color:'var(--muted)',marginTop:'.4rem'}}>{pct}% of {total} chapters</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{total-read}</div>
          <div className="stat-label">Chapters Remaining</div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${100-pct}%`,background:'linear-gradient(90deg,var(--gold),var(--gold2))'}}/></div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{themesEncountered.size}</div>
          <div className="stat-label">Themes Encountered</div>
          <div style={{marginTop:'.75rem',display:'flex',flexWrap:'wrap',gap:'.3rem',justifyContent:'center'}}>
            {[...themesEncountered].slice(0,4).map(t=><span key={t} style={{fontSize:'.7rem',color:THEME_MAP[t]?.color||'var(--gold)',background:'var(--bg2)',padding:'.15rem .5rem',borderRadius:'3px'}}>{THEME_MAP[t]?.label}</span>)}
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{Object.values(notes).filter(v=>v.trim()).length}</div>
          <div className="stat-label">Notes Written</div>
        </div>
      </div>

      {recentNotes.length>0&&(
        <div className="notes-section">
          <h3>Recent Notes</h3>
          {recentNotes.map(({ch,text})=>(
            <div key={ch.id} className="note-item" onClick={()=>{setJumpChapter(ch.id);setSection('chapters');}}>
              <strong>Ch. {ch.id} — {ch.title}</strong>
              <p>{text}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── CHAPTER GUIDE ────────────────────────────────────
function ChapterGuide({readSet,setReadSet,notes,setNotes,jumpChapter,setJumpChapter,setSection,setJumpTheme}){
  const [search,setSearch]=useState('');
  const [toneFilter,setToneFilter]=useState('all');
  const [showUnread,setShowUnread]=useState(false);
  const [showPhil,setShowPhil]=useState(false);
  const [expanded,setExpanded]=useState(jumpChapter||null);
  const [savedId,setSavedId]=useState(null);
  const saveTimer=React.useRef(null);

  useEffect(()=>{
    if(jumpChapter){
      setExpanded(jumpChapter);
      setJumpChapter(null);
      setTimeout(()=>{
        const el=document.getElementById(`ch-${jumpChapter}`);
        if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      },100);
    }
  },[jumpChapter]);

  const tones=['narrative','philosophical','essayistic','action','lyrical','dramatic'];
  const filtered=useMemo(()=>CHAPTERS.filter(c=>{
    if(search&&!c.title.toLowerCase().includes(search.toLowerCase())&&!c.summary.toLowerCase().includes(search.toLowerCase()))return false;
    if(toneFilter!=='all'&&c.tone!==toneFilter)return false;
    if(showUnread&&readSet.has(c.id))return false;
    if(showPhil&&!PHIL_CHAPTERS.has(c.id))return false;
    return true;
  }),[search,toneFilter,showUnread,showPhil,readSet]);

  const toggleRead=useCallback((id,e)=>{e.stopPropagation();const s=new Set(readSet);s.has(id)?s.delete(id):s.add(id);setReadSet(s);},[readSet,setReadSet]);

  const handleNoteChange=useCallback((id,val)=>{
    setNotes(p=>({...p,[id]:val}));
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{ setSavedId(id); setTimeout(()=>setSavedId(null),1400); },600);
  },[setNotes]);

  const jumpToChapter=useCallback((id)=>{
    setExpanded(id);
    setTimeout(()=>{
      const el=document.getElementById(`ch-${id}`);
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    },60);
  },[]);

  return(
    <div>
      <div className="section-header">
        <h2>Chapter Guide</h2>
        <p>All 135 chapters of Moby-Dick — click any chapter to open the full detail panel</p>
      </div>
      <input className="search-bar" placeholder="Search chapters…" value={search} onChange={e=>setSearch(e.target.value)}/>
      <div className="filter-row">
        <button className={`filter-btn${toneFilter==='all'?' active':''}`} onClick={()=>setToneFilter('all')}>All Tones</button>
        {tones.map(t=><button key={t} className={`filter-btn${toneFilter===t?' active':''}`} onClick={()=>setToneFilter(t)}>{t}</button>)}
        <button className={`filter-btn${showUnread?' active':''}`} onClick={()=>setShowUnread(p=>!p)}>Unread only</button>
        <button className={`filter-btn${showPhil?' active':''}`} onClick={()=>setShowPhil(p=>!p)}>Essential only</button>
      </div>
      <div style={{color:'var(--muted)',fontSize:'.8rem',marginBottom:'.75rem'}}>{filtered.length} chapter{filtered.length!==1?'s':''} shown · {readSet.size}/{CHAPTERS.length} read</div>
      <div style={{display:'flex',flexDirection:'column',gap:'.5rem'}}>
        {filtered.map(c=>{
          const det=CH_DETAILS[c.id];
          const isOpen=expanded===c.id;
          const noteVal=notes[c.id]||'';
          return(
            <div key={c.id} id={`ch-${c.id}`} className={`ch-card${readSet.has(c.id)?' read':''}${PHIL_CHAPTERS.has(c.id)?' phil':''}`}>
              <div className="ch-header" onClick={()=>setExpanded(p=>p===c.id?null:c.id)}>
                <div className="ch-num">{c.id}</div>
                <div style={{flex:1}}>
                  <div className={`ch-title${readSet.has(c.id)?' read':''}`}>{c.title}</div>
                  <div className="ch-badges">
                    <ToneTag tone={c.tone}/>
                    {PHIL_CHAPTERS.has(c.id)&&<span className="tag tag-phil-badge">★ Essential</span>}
                    {det&&<span className="tag" style={{background:'#0d1f3a',color:'#5ab0e8',fontSize:'.62rem',letterSpacing:'.04em'}}>✦ Full Analysis</span>}
                    {readSet.has(c.id)&&<span className="tag" style={{background:'#0d2a14',color:'#5ae890',fontSize:'.65rem'}}>✓ Read</span>}
                    {noteVal.trim()&&<span className="tag" style={{background:'#1a2a0a',color:'#a8c870',fontSize:'.65rem'}}>✎ Note</span>}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexShrink:0}}>
                  <span style={{fontSize:'.7rem',color:'var(--muted)',fontFamily:'system-ui'}}>{isOpen?'▲':'▼'}</span>
                  <div className={`ch-check${readSet.has(c.id)?' checked':''}`} onClick={e=>toggleRead(c.id,e)} title="Mark as read">
                    {readSet.has(c.id)&&<CheckIcon/>}
                  </div>
                </div>
              </div>

              {isOpen&&(
                <div className="ch-body">
                  {det?(
                    <>
                      {/* ── Full Analysis ── */}
                      <div className="ch-detail-section">
                        <div className="ch-section-label">Full Analysis</div>
                        <p className="ch-analysis">{det.analysis}</p>
                      </div>

                      {/* ── Key Themes ── */}
                      <div className="ch-detail-section">
                        <div className="ch-section-label">Key Themes</div>
                        <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap',marginTop:'.1rem'}}>
                          {c.themes.map(t=><ThemeTag key={t} tid={t} onClick={(tid)=>{setJumpTheme(tid);setSection('themes');}}/>)}
                        </div>
                      </div>

                      {/* ── Key Passage ── */}
                      {det.passage&&(
                      <div className="ch-detail-section">
                        <div className="ch-section-label">Key Passage</div>
                        <div className="ch-passage-block">
                          <div className="ch-passage-text">"{det.passage.text}"</div>
                          <div className="ch-passage-source">— {det.passage.source}</div>
                        </div>
                      </div>
                      )}

                      {/* ── Connections ── */}
                      {det.connections&&(
                      <div className="ch-detail-section">
                        <div className="ch-section-label">Connections</div>
                        <div className="ch-connections">
                          {det.connections.map(cn=>{
                            const tgt=CHAPTERS.find(x=>x.id===cn.id);
                            return tgt?(
                              <div key={cn.id} className="ch-conn-item" onClick={()=>jumpToChapter(cn.id)}>
                                <span className="ch-conn-num">Ch. {cn.id}</span>
                                <span className="ch-conn-note"><strong style={{color:'var(--text)',fontFamily:"'Playfair Display',serif",fontSize:'.82rem'}}>{tgt.title}</strong> — {cn.note}</span>
                              </div>
                            ):null;
                          })}
                        </div>
                      </div>
                      )}
                    </>
                  ):(
                    <div className="ch-summary-plain">{c.summary}</div>
                  )}

                  {/* ── My Notes (always shown) ── */}
                  <div className="ch-detail-section ch-notes">
                    <div className="ch-section-label">My Notes</div>
                    <textarea
                      placeholder="Write your observations about this chapter…"
                      value={noteVal}
                      onChange={e=>handleNoteChange(c.id,e.target.value)}
                    />
                    <div className="ch-notes-footer">
                      <span className="ch-char-count">{noteVal.length} characters</span>
                      <span className={`ch-saved${savedId===c.id?' visible':''}`}>✓ Saved</span>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length===0&&<div className="empty">No chapters match your filters.</div>}
      </div>
    </div>
  );
}

              </>
            )}
            <div style={{fontSize:'.75rem',color:'var(--muted)',marginTop:'.75rem',fontStyle:'italic'}}>{selected===c.name?'Click to collapse':'Click to expand →'}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── THEMES ───────────────────────────────────────────
function ThemesTracker({jumpTheme,setJumpTheme,setSection,setJumpChapter}){
  const [active,setActive]=useState(jumpTheme||null);
  useEffect(()=>{
    if(jumpTheme){setActive(jumpTheme);setJumpTheme(null);}
  },[jumpTheme]);
  const theme=active?THEMES.find(t=>t.id===active):null;
  return(
    <div>
      <div className="section-header">
        <h2>Themes Tracker</h2>
        <p>Major philosophical and literary themes and where they appear</p>
      </div>
      {active&&theme?(
        <>
          <button className="back-btn" onClick={()=>setActive(null)}>← All Themes</button>
          <div className="theme-detail">
            <h3>{theme.icon} {theme.name}</h3>
            <div className="desc">{theme.desc}</div>
            <div className="theme-ch-list">
              {theme.chapters.map(tc=>{
                const ch=CHAPTERS.find(c=>c.id===tc.id);
                return ch?(
                  <div key={tc.id} className="theme-ch-item" onClick={()=>{setJumpChapter(tc.id);setSection('chapters');}}>
                    <strong>Ch. {tc.id} — {ch.title}</strong>
                    <p>{tc.note}</p>
                    <div style={{marginTop:'.4rem',display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                      <ToneTag tone={ch.tone}/>
                      {PHIL_CHAPTERS.has(ch.id)&&<span className="tag tag-phil-badge">★ Essential</span>}
                    </div>
                  </div>
                ):null;
              })}
            </div>
          </div>
        </>
      ):(
        <div className="card-grid card-grid-3">
          {THEMES.map(t=>(
            <div key={t.id} className="theme-card" onClick={()=>setActive(t.id)}>
              <div style={{fontSize:'1.75rem',marginBottom:'.5rem'}}>{t.icon}</div>
              <div className="theme-name">{t.name}</div>
              <div className="theme-desc">{t.desc.slice(0,120)}…</div>
              <div className="theme-ch-count">{t.chapters.length} key chapters · Click to explore →</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── PRIMERS ──────────────────────────────────────────
function PhilosophyPrimers(){
  const [active,setActive]=useState(null);
  const primer=active?PRIMERS.find(p=>p.id===active):null;
  return(
    <div>
      <div className="section-header">
        <h2>Philosophy &amp; History Primers</h2>
        <p>Context that deepens the reading experience</p>
      </div>
      {primer?(
        <>
          <button className="back-btn" onClick={()=>setActive(null)}>← All Primers</button>
          <div className="primer-full">
            <h2>{primer.title}</h2>
            <div dangerouslySetInnerHTML={{__html:primer.content}}/>
          </div>
        </>
      ):(
        <div className="card-grid card-grid-2">
          {PRIMERS.map(p=>(
            <div key={p.id} className="primer-card" onClick={()=>setActive(p.id)}>
              <div className="primer-title">{p.title}</div>
              <div className="primer-preview">{p.preview}</div>
              <div style={{fontSize:'.78rem',color:'var(--gold)',marginTop:'.75rem'}}>Read primer →</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── RESOURCES ────────────────────────────────────────
function Resources(){
  const cats=[...new Set(RESOURCES.map(r=>r.cat))];
  return(
    <div>
      <div className="section-header">
        <h2>Literary Criticism &amp; Resources</h2>
        <p>Curated links for deeper engagement with the novel</p>
      </div>
      {cats.map(cat=>(
        <div key={cat} style={{marginBottom:'2rem'}}>
          <h3 style={{fontFamily:"'Playfair Display',serif",color:'var(--gold)',marginBottom:'.85rem',fontSize:'1.1rem',borderBottom:'1px solid var(--border)',paddingBottom:'.5rem'}}>{cat}</h3>
          <div style={{display:'flex',flexDirection:'column',gap:'.65rem'}}>
            {RESOURCES.filter(r=>r.cat===cat).map(r=>(
              <div key={r.title} className="resource-card">
                <div className="resource-title">
                  <a href={r.url} target="_blank" rel="noopener noreferrer">{r.title} ↗</a>
                </div>
                <div className="resource-desc">{r.desc}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'8px',padding:'1.5rem',marginTop:'1rem'}}>
        <h3 style={{fontFamily:"'Playfair Display',serif",color:'var(--gold)',marginBottom:'.75rem'}}>A Note on the Novel</h3>
        <p style={{color:'var(--dim)',fontSize:'.88rem',lineHeight:'1.75'}}>
          Moby-Dick was published October 18, 1851. It was not well received in its time — Melville's reputation, made by Typee and Omoo, never fully recovered from its mixed reviews and modest sales. He died in 1891, largely forgotten. The novel was rediscovered in the 1920s and now stands as one of the great works of world literature: an American epic, a philosophical novel, a whaling manual, a meditation on God and evil, and one of the strangest and most beautiful books ever written.
        </p>
        <div className="quote-block" style={{marginTop:'1rem'}}>
          "It is not down on any map; true places never are." — Chapter 12
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────
function App(){
  const [section,setSection]=useState('dashboard');
  const [readSet,setReadSetRaw]=useState(()=>new Set(loadLS('md_read',[])));
  const [notes,setNotesRaw]=useState(()=>loadLS('md_notes',{}));
  const [jumpChapter,setJumpChapter]=useState(null);
  const [jumpTheme,setJumpTheme]=useState(null);

  const setReadSet=useCallback(s=>{setReadSetRaw(s);saveLS('md_read',[...s]);},[]);
  const setNotes=useCallback(fn=>{setNotesRaw(prev=>{const n=typeof fn==='function'?fn(prev):fn;saveLS('md_notes',n);return n;});},[]);

  const goChapter=useCallback((id)=>{setJumpChapter(id);setSection('chapters');},[]);
  const goTheme=useCallback((id)=>{setJumpTheme(id);setSection('themes');},[]);

  return(
    <>
      <Nav section={section} setSection={setSection}/>
      <main className="main">
        {section==='dashboard'&&<Dashboard readSet={readSet} notes={notes} setSection={setSection} setJumpChapter={setJumpChapter}/>}
        {section==='chapters'&&<ChapterGuide readSet={readSet} setReadSet={setReadSet} notes={notes} setNotes={setNotes} jumpChapter={jumpChapter} setJumpChapter={setJumpChapter} setSection={setSection} setJumpTheme={goTheme}/>}
        {section==='characters'&&<CharacterProfiles/>}
        {section==='themes'&&<ThemesTracker jumpTheme={jumpTheme} setJumpTheme={setJumpTheme} setSection={setSection} setJumpChapter={goChapter}/>}
        {section==='primers'&&<PhilosophyPrimers/>}
        {section==='resources'&&<Resources/>}
      </main>
      <footer style={{textAlign:'center',padding:'2rem',borderTop:'1px solid var(--border)',color:'var(--muted)',fontSize:'.78rem',marginTop:'4rem'}}>
        <div style={{fontFamily:"'Playfair Display',serif",color:'var(--border2)',fontSize:'1.2rem',marginBottom:'.5rem'}}>〜〜〜</div>
        Moby-Dick Reading Companion · All progress saved locally · Herman Melville, 1851
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
